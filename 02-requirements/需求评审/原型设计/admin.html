<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KM-MOM DataAgent - 管理侧原型</title>
  <style>
    :root {
      --bg: #FAFAFA;
      --fg: #111111;
      --surface: #FFFFFF;
      --muted: #6B6B6B;
      --border: #E5E5E5;
      --accent: #2F6FEB;
      --sidebar: #F4F7FC;
      --sidebar-strong: #EAF1FF;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --sidebar-width: 288px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; min-height: 100%; margin: 0; background: var(--bg); color: var(--fg); font-family: var(--font); font-size: 14px; line-height: 1.5; }
    body { overflow: hidden; }
    button, a { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    svg { width: 18px; height: 18px; display: block; flex: 0 0 auto; }

    .app-shell { width: 100%; height: 100vh; min-height: 0; display: grid; grid-template-columns: var(--sidebar-width) minmax(0, 1fr); background: var(--bg); transition: grid-template-columns 180ms ease; overflow: hidden; }
    .app-shell.is-collapsed { --sidebar-width: 76px; }
    .sidebar { height: 100vh; min-height: 0; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 18px 14px; gap: 16px; min-width: 0; }
    .brand-row { display: grid; grid-template-columns: minmax(0, 1fr) 34px; align-items: center; gap: 10px; min-height: 48px; }
    .brand-name { min-width: 0; font-weight: 600; line-height: 1.15; letter-spacing: 0; color: var(--fg); }
    .brand-name span { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .brand-name span:first-child { font-size: 19px; }
    .brand-name span:last-child { margin-top: 2px; font-size: 17px; color: color-mix(in srgb, var(--fg) 82%, var(--muted)); }
    .collapse-button { width: 34px; height: 34px; border: 1px solid var(--border); border-radius: 8px; display: grid; place-items: center; background: var(--surface); color: var(--muted); padding: 0; }
    .collapse-button:hover { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 36%, var(--border)); }
    .primary-actions, .nav-list { display: grid; gap: 10px; }
    .btn { min-height: 38px; border-radius: 8px; border: 1px solid transparent; padding: 9px 14px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; white-space: nowrap; background: var(--surface); color: var(--fg); line-height: 1.2; transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 120ms ease; }
    .btn:active, .nav-item:active, .collapse-button:active { transform: translateY(1px); }
    .btn-primary { background: var(--accent); color: #FFFFFF; }
    .btn-secondary { border-color: var(--border); }
    .btn-secondary:hover { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 34%, var(--border)); }
    .primary-actions .btn.is-active { background: var(--sidebar-strong); border-color: color-mix(in srgb, var(--accent) 24%, var(--border)); color: var(--accent); }
    .nav-block { min-height: 0; display: flex; flex-direction: column; gap: 10px; flex: 1; padding-top: 2px; }
    .nav-title { display: flex; align-items: center; justify-content: space-between; color: var(--muted); font-size: 12px; font-weight: 600; }
    .nav-list { min-height: 0; overflow-y: auto; padding-right: 2px; }
    .nav-list::-webkit-scrollbar { width: 8px; }
    .nav-list::-webkit-scrollbar-thumb { background: #D6DDE8; border-radius: 999px; }
    .nav-item { border: 1px solid transparent; border-radius: 8px; padding: 10px; background: transparent; display: grid; grid-template-columns: 28px minmax(0, 1fr); align-items: center; gap: 8px; color: var(--fg); min-height: 44px; text-align: left; transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 120ms ease; }
    .nav-item:hover { background: rgba(255, 255, 255, 0.72); }
    .nav-item.is-active { background: var(--sidebar-strong); border-color: color-mix(in srgb, var(--accent) 24%, var(--border)); color: var(--accent); }
    .nav-icon { width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border); display: grid; place-items: center; background: var(--surface); color: currentColor; }
    .nav-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
    .sidebar-footnote { border-top: 1px solid var(--border); padding-top: 12px; color: var(--muted); font-size: 12px; }
    .app-shell.is-collapsed .brand-row { grid-template-columns: 1fr; justify-items: center; min-height: 40px; }
    .app-shell.is-collapsed .brand-name, .app-shell.is-collapsed .btn-label, .app-shell.is-collapsed .nav-label, .app-shell.is-collapsed .nav-title, .app-shell.is-collapsed .sidebar-footnote { display: none; }
    .app-shell.is-collapsed .collapse-button svg { transform: rotate(180deg); }
    .app-shell.is-collapsed .sidebar { padding-left: 14px; padding-right: 14px; align-items: center; }
    .app-shell.is-collapsed .primary-actions, .app-shell.is-collapsed .nav-list { width: 100%; }
    .app-shell.is-collapsed .btn { width: 46px; height: 42px; padding: 0; margin: 0 auto; }
    .app-shell.is-collapsed .nav-item { grid-template-columns: 1fr; justify-items: center; padding: 8px 0; }
    .page-frame-wrap { min-width: 0; min-height: 0; height: 100vh; background: var(--bg); overflow: hidden; }
    .page-frame { width: 100%; height: 100%; border: 0; display: block; background: var(--bg); }

    @media (max-width: 900px) {
      body { overflow: auto; }
      .app-shell { width: 100%; height: 100vh; min-height: 0; grid-template-columns: 1fr; grid-template-rows: auto minmax(0, 1fr); }
      .sidebar { min-height: auto; position: sticky; top: 0; z-index: 10; border-right: 0; border-bottom: 1px solid var(--border); }
      .brand-row { grid-template-columns: minmax(0, 1fr); }
      .collapse-button { display: none; }
      .primary-actions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .nav-block { flex: none; }
      .nav-title { display: flex !important; }
      .nav-list { display: flex; overflow-x: auto; padding-bottom: 2px; }
      .nav-item { width: auto; min-width: max-content; }
      .nav-label, .btn-label { display: inline !important; }
      .sidebar-footnote { display: none; }
      .page-frame-wrap { height: auto; min-height: 0; }
      .page-frame { height: calc(100vh - 188px); min-height: 0; }
    }

    @media (max-width: 640px) {
      .sidebar { padding: 14px 12px; }
      .brand-name span:first-child { font-size: 17px; }
      .brand-name span:last-child { font-size: 15px; }
      .primary-actions { grid-template-columns: 1fr; }
      .page-frame { height: calc(100vh - 214px); min-height: 0; }
    }
  </style>
</head>

llapsed .nav-item {\n        grid-template-columns: 28px minmax(0, 1fr);\n        place-items: initial;\n      }\n\n      .content { padding: 24px 20px; }\n      .page-head { display: grid; }\n\n      .overview-actions {\n        align-items: flex-start;\n        flex-direction: column;\n      }\n\n      .card-buttons {\n        width: 100%;\n        justify-content: flex-end;\n      }\n\n      .footer-actions {\n        padding: 12px 16px;\n        justify-content: flex-end;\n        flex-wrap: wrap;\n        overflow-x: visible;\n      }\n\n      .footer-actions .btn { min-width: auto; }\n      .form-grid { grid-template-columns: 1fr; }\n\n      .modal-actions { display: grid; }\n\n      .modal-actions-left,\n      .modal-actions-right {\n        justify-content: flex-end;\n        flex-wrap: wrap;\n      }\n    }\n  </style>\n</head>\n<body>\n  <main id=\"appShell\" class=\"app-shell\" aria-label=\"KM-MOM DataAgent 模型配置页面\">\n    <aside class=\"sidebar\" aria-label=\"智能体配置导航\">\n      <div class=\"brand-row\">\n        <div class=\"brand-name\" aria-label=\"KM-MOM DataAgent\">\n          <span>KM-MOM</span>\n          <span>DataAgent</span>\n        </div>\n        <button id=\"collapseButton\" class=\"collapse-button\" type=\"button\" aria-label=\"收起侧边栏\" aria-expanded=\"true\" title=\"收起侧边栏\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M15 6l-6 6 6 6\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n          </svg>\n        </button>\n      </div>\n\n      <div class=\"primary-actions\">\n        <button class=\"btn btn-primary\" type=\"button\" title=\"前往运行页面\" aria-label=\"前往运行页面\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M5 12h13M12 5l7 7-7 7\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n          </svg>\n          <span class=\"btn-label\">前往运 ata-test=\"LLM\">测试</button>\n                </div>\n              </div>\n            </article>\n\n            <article class=\"overview-card\">\n              <div class=\"overview-top\">\n                <div class=\"overview-title\">当前默认嵌入模型</div>\n                <span class=\"tag tag-warn\">未测试</span>\n              </div>\n              <div class=\"model-name\">text-embedding-v3</div>\n              <div class=\"meta-grid\">\n                <span>供应商</span><strong>阿里云百炼</strong>\n                <span>状态</span><strong>默认模型</strong>\n                <span>最近测试</span><strong>--</strong>\n              </div>\n              <div class=\"overview-actions\">\n                <span class=\"tag\">API Key 已脱敏</span>\n                <div class=\"card-buttons\">\n                  <button class=\"btn btn-soft open-config\" type=\"button\" data-type=\"embedding\">配置</button>\n                  <button class=\"btn btn-secondary test-card\" type=\"button\" data-test=\"嵌入模型\">测试</button>\n                </div>\n              </div>\n            </article>\n\n            <article class=\"overview-card\">\n              <div class=\"overview-top\">\n                <div class=\"overview-title\">当前默认语音模型</div>\n                <span class=\"tag tag-danger\">测试失败</span>\n              </div>\n              <div class=\"model-name\">paraformer-realtime</div>\n              <div class=\"meta-grid\">\n                <span>供应商</span><strong>阿里云智能语音</strong>\n                <span>状态</span><strong>默认模型</strong>\n                <span>最近测试</span><strong>昨天 16:40</strong>\n              </div>\n              <div class=\"overview-actions\">\n                <span class=\"tag\">API Key 已脱敏</span>\n                <div class=\"card-buttons\">\n                  <button class=\"btn btn-soft open-config\" type=\"button\" data-type=\"voice\">配置</button>\n                  <button class=\"btn btn-secondary test-card\" type=\"button\" data-test=\"语音模型\">测试</button>\n                </div>\n              </div>\n            </article>\n          </section>\n        </div>\n      </section>\n\n      <footer class=\"footer-actions\" aria-label=\"底部操作区\">\n        <button id=\"testAllButton\" class=\"btn btn-primary\" type=\"button\">测试全部连接</button>\n      </footer>\n    </section>\n  </main>\n\n  <div id=\"modalLayer\" class=\"modal-layer\" aria-hidden=\"true\">\n    <section class=\"modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"modalTitle\">\n      <header class=\"modal-head\">\n        <div class=\"modal-title\">\n          <h2 id=\"modalTitle\">LLM 模型配置</h2>\n          <p id=\"modalDesc\">用于自然语言理解和业务问答生成。</p>\n        </div>\n        <button id=\"closeModal\" class=\"close-button\" type=\"button\" aria-label=\"关闭配置弹窗\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M7 7l10 10M17 7L7 17\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"/>\n          </svg>\n        </button>\n      </header>\n\n      <div class=\"modal-body\">\n        <form id=\"modalForm\" class=\"form-grid\"></form>\n      </div>\n\n      <footer class=\"modal-actions\">\n        <div class=\"modal-actions-left\">\n          <button id=\"testButton\" class=\"btn btn-secondary\" type=\"button\">测试连接</button>\n          <button class=\"btn btn-soft\" type=\"button\">设为默认</button>\n        </div>\n        <div class=\"modal-actions-right\">\n          <button id=\"cancelModal\" class=\"btn btn-secondary\" type=\"button\">取消</button>\n          <button class=\"btn btn-primary\" type=\"button\">保存</button>\n        </div>\n      </footer>\n    </section>\n  </div>\n\n  <script>\n    const appShell = document.getElementById('appShell');\n    const collapseButton = document.getElementById('collapseButton');\n    const modalLayer = document.getElementById('modalLayer');\n    const modalTitle = document.getElementById('modalTitle');\n    const modalDesc = document.getElementById('modalDesc');\n    const modalForm = document.getElementById('modalForm');\n    const testButton = document.getElementById('testButton');\n    const closeModal = document.getElementById('closeModal');\n    const cancelModal = document.getElementById('cancelModal');\n    const testAllButton = document.getElementById('testAllButton');\n\n    const forms = {\n      llm: {\n        title: 'LLM 模型配置',\n        desc: '用于自然语言理解和业务问答生成。',\n        test: '测试连接',\n        fields: [\n          ['配置名称', '默认问数 LLM', true],\n          ['供应商', '阿里云百炼', true, 'select', ['阿里云百炼', 'Azure OpenAI', 'OpenAI Compatible']],\n          ['接口地址 Base URL', 'https://dashscope.aliyuncs.com/compatible-mode/v1', true],\n          ['API Key', 'sk-••••••••••••••••8F2A', true, 'password'],\n          ['模型名称', 'qwen-plus', true],\n          ['使用场景', '业务问数与结果解释', false, 'select', ['业务问数与结果解释', '指标口径说明', '报告摘要生成']]\n        ],\n        extra: 'output'\n      },\n      embedding: {\n        title: '嵌入模型配置',\n        desc: '用于知识内容与语义检索向量化。',\n        test: '测试向量化',\n        fields: [\n          ['配置名称', '默认嵌入模型', true],\n          ['供应商', '阿里云百炼', true, 'select', ['阿里云百炼', 'OpenAI Compatible', '本地服务']],\n          ['接口地址 Base URL', 'https://dashscope.aliyuncs.com/compatible-mode/v1', true],\n          ['API Key', 'sk-••••••••••••••••61C9', true, 'password'],\n          ['模型名称', 'text-embedding-v3', true],\n          ['向量维度', '1024', true],\n          ['批量处理数量', '32', false],\n          ['最大文本长度', '8192', false]\n        ],\n        hint: '更换嵌入模型后，知识库、Schema 和语义配置可能需要重新初始化。'\n      },\n      voice: {\n        title: '语音模型配置',\n        desc: '用于语音输入识别和后续语音能力。',\n        test: '测试语音识别',\n        fields: [\n          ['配置名称', '默认语音识别', true],\n          ['模型类型', '语音识别 ASR', true, 'select', ['语音识别 ASR', '语音合成 TTS']],\n          ['供应商', '阿里云智能语音', true, 'select', ['阿里云智能语音', 'Azure Speech', 'OpenAI Compatible']],\n          ['接口地址 Base URL', 'https://nls-gateway.aliyuncs.com', true],\n          ['API Key', 'ak-••••••••••••••••90DE', true, 'password'],\n          ['模型名称', 'paraformer-realtime', true],\n          ['支持语言', '中文普通话', false],\n          ['音频格式', 'wav / pcm / mp3', false, 'select', ['wav / pcm / mp3', 'wav', 'mp3']],\n          ['最大音频时长', '60 秒', false]\n        ]\n      }\n    };\n\n    collapseButton.addEventListener('click', () => {\n      const collapsed = appShell.classList.toggle('is-collapsed');\n      collapseButton.setAttribute('aria-expanded', String(!collapsed));\n      collapseButton.setAttribute('aria-label', collapsed ? '展开侧边栏' : '收起侧边栏');\n      collapseButton.setAttribute('title', collapsed ? '展开侧边栏' : '收起侧边栏');\n    });\n\n    function fieldTemplate(field) {\n      const [label, value, required, type, options] = field;\n      const requiredMark = required ? '<span class=\"required\">*</span>' : '';\n\n      if (type === 'select') {\n        return `\n          <div class=\"field\">\n            <label>${label}${requiredMark}</label>\n            <select class=\"select\">\n              ${options.map((option) => `<option${option === value ? ' selected' : ''}>${option}</option>`).join('')}\n            </select>\n          </div>\n        `;\n      }\n\n      return `\n        <div class=\"field\">\n          <label>${label}${requiredMark}</label>\n          <input class=\"input ${type === 'password' ? 'masked-input' : ''}\" value=\"${value}\">\n        </div>\n      `;\n    }\n\n    function openConfig(type) {\n      const data = forms[type];\n      modalTitle.textContent = data.title;\n      modalDesc.textContent = data.desc;\n      testButton.textContent = data.test;\n\n      let html = data.fields.map(fieldTemplate).join('');\n\n      if (data.extra === 'output') {\n        html += `\n          <div class=\"field full\">\n            <label>输出模式</label>\n            <div class=\"segmented\" role=\"group\" aria-label=\"输出模式\">\n              <button class=\"segment is-active\" type=\"button\">流式</button>\n              <button class=\"segment\" type=\"button\">非流式</button>\n            </div>\n          </div>\n        `;\n      }\n\n      html += `\n        <div class=\"field full\">\n          <div class=\"checkbox-row\">\n            <span class=\"checkbox\" aria-hidden=\"true\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\">\n                <path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n              </svg>\n            </span>\n            是否设为默认\n          </div>\n        </div>\n      `;\n\n      if (data.hint) {\n        html += `<div class=\"hint\">${data.hint}</div>`;\n      }\n\n      modalForm.innerHTML = html;\n      modalLayer.classList.add('is-open');\n      modalLayer.setAttribute('aria-hidden', 'false');\n    }\n\n    function hideModal() {\n      modalLayer.classList.remove('is-open');\n      modalLayer.setAttribute('aria-hidden', 'true');\n    }\n\n    document.querySelectorAll('.open-config').forEach((button) => {\n      button.addEventListener('click', () => openConfig(button.dataset.type));\n    });\n\n    document.querySelectorAll('.test-card').forEach((button) => {\n      button.addEventListener('click', () => {\n        const label = button.dataset.test || '模型';\n        const original = button.textContent;\n        button.textContent = '测试中';\n        button.disabled = true;\n        setTimeout(() => {\n          button.textContent = label === '语音模型' ? '重试' : '通过';\n          button.disabled = false;\n        }, 700);\n      });\n    });\n\n    testAllButton.addEventListener('click', () => {\n      const original = testAllButton.textContent;\n      testAllButton.textContent = '测试中...';\n      testAllButton.disabled = true;\n      setTimeout(() => {\n        testAllButton.textContent = '测试全部连接';\n        testAllButton.disabled = false;\n      }, 900);\n    });\n\n    closeModal.addEventListener('click', hideModal);\n    cancelModal.addEventListener('click', hideModal);\n\n    modalLayer.addEventListener('click', (event) => {\n      if (event.target === modalLayer) hideModal();\n    });\n\n    document.addEventListener('keydown', (event) => {\n      if (event.key === 'Escape') hideModal();\n    });\n  <\/script>\n</body>\n</html>\n","datasource":"\n<!doctype html>\n<html lang=\"zh-CN\">\n<head>\n  <meta charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n  <title>KM-MOM DataAgent - 数据源配置</title>\n  <style>\n    :root {\n      --bg: #FAFAFA;\n      --fg: #111111;\n      --surface: #FFFFFF;\n      --muted: #6B6B6B;\n      --border: #E5E5E5;\n      --accent: #2F6FEB;\n      --success: #17A34A;\n      --warn: #EAB308;\n      --danger: #DC2626;\n      --sidebar: #F4F7FC;\n      --sidebar-strong: #EAF1FF;\n      --modal-shadow: 0 16px 48px rgba(17, 17, 17, 0.18);\n      --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;\n      --sidebar-width: 288px;\n    }\n\n    * { box-sizing: border-box; }\n\n    html,\n    body {\n      min-height: 100%;\n      margin: 0;\n      background: var(--bg);\n      color: var(--fg);\n      font-family: var(--font);\n      font-size: 14px;\n      line-height: 1.5;\n    }\n\n    body { overflow: hidden; }\n\n    button,\n    input,\n    select {\n      font: inherit;\n    }\n\n    button { cursor: pointer; }\n\n    button:disabled {\n      cursor: not-allowed;\n      opacity: 0.58;\n    }\n\n    svg {\n      width: 18px;\n      height: 18px;\n      display: block;\n      flex: 0 0 auto;\n    }\n\n    .app-shell {\n      width: 100vw;\n      height: 100dvh;\n      min-height: 720px;\n      display: grid;\n      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);\n      background: var(--bg);\n      transition: grid-template-columns 180ms ease;\n    }\n\n    .app-shell.is-collapsed { --sidebar-width: 76px; }\n\n    .sidebar {\n      height: 100dvh;\n      min-height: 720px;\n      background: var(--sidebar);\n      border-right: 1px solid var(--border);\n      display: flex;\n      flex-direction: column;\n      padding: 18px 14px;\n      gap: 16px;\n      min-width: 0;\n    }\n\n    .brand-row {\n      display: grid;\n      grid-template-columns: minmax(0, 1fr) 34px;\n      align-items: center;\n      gap: 10px;\n      min-height: 48px;\n    }\n\n    .brand-name {\n      min-width: 0;\n      font-weight: 600;\n      line-height: 1.15;\n      letter-spacing: -0.01em;\n      color: var(--fg);\n    }\n\n    .brand-name span {\n      display: block;\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n\n    .brand-name span:first-child { font-size: 19px; }\n\n    .brand-name span:last-child {\n      margin-top: 2px;\n      font-size: 17px;\n      color: color-mix(in srgb, var(--fg) 82%, var(--muted));\n    }\n\n    .collapse-button {\n      width: 34px;\n      height: 34px;\n      border: 1px solid var(--border);\n      border-radius: 8px;\n      display: grid;\n      place-items: center;\n      background: var(--surface);\n      color: var(--muted);\n      padding: 0;\n    }\n\n    .collapse-button:hover {\n      color: var(--accent);\n      border-color: color-mix(in srgb, var(--accent) 36%, var(--border));\n    }\n\n    .primary-actions,\n    .nav-list {\n      display: grid;\n      gap: 10px;\n    }\n\n    .btn {\n      min-height: 38px;\n      border-radius: 8px;\n      border: 1px solid transparent;\n      padding: 9px 14px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      gap: 8px;\n      font-weight: 600;\n      white-space: nowrap;\n      background: var(--surface);\n      color: var(--fg);\n      line-height: 1.2;\n    }\n\n    .btn-primary {\n      background: var(--accent);\n      color: #FFFFFF;\n    }\n\n    .btn-secondary {\n      border-color: var(--border);\n    }\n\n    .btn-secondary:hover {\n      color: var(--accent);\n      border-color: color-mix(in srgb, var(--accent) 34%, var(--border));\n    }\n\n    .btn-soft {\n      background: color-mix(in srgb, var(--accent) 8%, white);\n      color: var(--accent);\n      border-color: color-mix(in srgb, var(--accent) 24%, var(--border));\n    }\n\n    .btn-danger {\n      color: var(--danger);\n      border-color: color-mix(in srgb, var(--danger) 28%, var(--border));\n      background: color-mix(in srgb, var(--danger) 6%, white);\n    }\n\n    .nav-block {\n      min-height: 0;\n      display: flex;\n      flex-direction: column;\n      gap: 10px;\n      flex: 1;\n      padding-top: 2px;\n    }\n\n    .nav-title {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      color: var(--muted);\n      font-size: 12px;\n      font-weight: 600;\n    }\n\n    .nav-list {\n      min-height: 0;\n      overflow-y: auto;\n      padding-right: 2px;\n    }\n\n    .nav-list::-webkit-scrollbar { width: 8px; }\n\n    .nav-list::-webkit-scrollbar-thumb {\n      background: #D6DDE8;\n      border-radius: 999px;\n    }\n\n    .nav-item {\n      border: 1px solid transparent;\n      border-radius: 8px;\n      padding: 10px;\n      background: transparent;\n      display: grid;\n      grid-template-columns: 28px minmax(0, 1fr);\n      align-items: center;\n      gap: 8px;\n      color: var(--fg);\n      min-height: 44px;\n      text-align: left;\n    }\n\n    .nav-item:hover { background: rgba(255, 255, 255, 0.72); }\n\n    .nav-item.is-active {\n      background: var(--sidebar-strong);\n      border-color: color-mix(in srgb, var(--accent) 24%, var(--border));\n      color: var(--accent);\n    }\n\n    .nav-icon {\n      width: 28px;\n      height: 28px;\n      border-radius: 7px;\n      border: 1px solid var(--border);\n      display: grid;\n      place-items: center;\n      background: var(--surface);\n      color: currentColor;\n    }\n\n    .nav-label {\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n      font-weight: 600;\n    }\n\n    .sidebar-footnote {\n      border-top: 1px solid var(--border);\n      padding-top: 12px;\n      color: var(--muted);\n      font-size: 12px;\n    }\n\n    .app-shell.is-collapsed .brand-row {\n      grid-template-columns: 1fr;\n      justify-items: center;\n      min-height: 40px;\n    }\n\n    .app-shell.is-collapsed .brand-name,\n    .app-shell.is-collapsed .btn-label,\n    .app-shell.is-collapsed .nav-title,\n    .app-shell.is-collapsed .nav-label,\n    .app-shell.is-collapsed .sidebar-footnote {\n      display: none;\n    }\n\n    .app-shell.is-collapsed .collapse-button {\n      width: 46px;\n      height: 42px;\n    }\n\n    .app-shell.is-collapsed .collapse-button svg {\n      transform: rotate(180deg);\n    }\n\n    .app-shell.is-collapsed .sidebar {\n      padding-left: 14px;\n      padding-right: 14px;\n      align-items: center;\n    }\n\n    .app-shell.is-collapsed .primary-actions,\n    .app-shell.is-collapsed .nav-block {\n      width: 100%;\n    }\n\n    .app-shell.is-collapsed .btn,\n    .app-shell.is-collapsed .nav-item {\n      width: 46px;\n      height: 42px;\n      min-height: 42px;\n      padding: 0;\n      margin: 0 auto;\n      grid-template-columns: 1fr;\n      place-items: center;\n    }\n\n    .main {\n      height: 100dvh;\n      min-height: 720px;\n      min-width: 0;\n      display: grid;\n      grid-template-rows: minmax(0, 1fr) auto;\n      background: var(--bg);\n    }\n\n    .content {\n      min-height: 0;\n      overflow: auto;\n      padding: 28px 32px 22px;\n    }\n\n    .content-inner {\n      width: min(1180px, 100%);\n      margin: 0 auto;\n      display: grid;\n      gap: 18px;\n    }\n\n    .page-head {\n      display: flex;\n      align-items: flex-start;\n      justify-content: space-between;\n      gap: 24px;\n    }\n\n    .page-title {\n      display: grid;\n      gap: 6px;\n      min-width: 0;\n    }\n\n    .page-title h1 {\n      margin: 0;\n      color: var(--fg);\n      font-size: 24px;\n      line-height: 1.2;\n      font-weight: 600;\n      letter-spacing: -0.01em;\n    }\n\n    .page-title p {\n      margin: 0;\n      color: var(--muted);\n    }\n\n    .save-state {\n      display: inline-flex;\n      align-items: center;\n      gap: 8px;\n      height: 32px;\n      padding: 0 10px;\n      border: 1px solid var(--border);\n      border-radius: 999px;\n      background: var(--surface);\n      color: var(--muted);\n      font-size: 12px;\n      white-space: nowrap;\n    }\n\n    .status-dot {\n      width: 7px;\n      height: 7px;\n      border-radius: 50%;\n      background: var(--success);\n    }\n\n    .toolbar {\n      min-height: 48px;\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 12px;\n      border: 1px solid var(--border);\n      border-radius: 12px;\n      background: var(--surface);\n      padding: 10px 12px;\n    }\n\n    .toolbar-left,\n    .toolbar-right {\n      display: inline-flex;\n      align-items: center;\n      gap: 8px;\n      flex-wrap: wrap;\n    }\n\n    .selection-text {\n      color: var(--muted);\n      font-size: 13px;\n    }\n\n    .input,\n    .select {\n      height: 36px;\n      border: 1px solid var(--border);\n      border-radius: 8px;\n      background: var(--surface);\n      color: var(--fg);\n      padding: 0 10px;\n      outline: 0;\n    }\n\n    .input {\n      width: 240px;\n    }\n\n    .select {\n      width: 132px;\n    }\n\n    .input:focus,\n    .select:focus {\n      border-color: var(--accent);\n      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 14%, transparent);\n    }\n\n    .datasource-grid {\n      display: grid;\n      grid-template-columns: repeat(3, minmax(0, 1fr));\n      gap: 12px;\n    }\n\n    .source-card {\n      position: relative;\n      min-height: 214px;\n      border: 1px solid var(--border);\n      border-radius: 12px;\n      background: var(--surface);\n      padding: 16px;\n      display: grid;\n      grid-template-rows: auto 1fr auto;\n      gap: 14px;\n      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;\n    }\n\n    .source-card:hover {\n      border-color: color-mix(in srgb, var(--accent) 28%, var(--border));\n    }\n\n    .source-card.is-selected {\n      border-color: color-mix(in srgb, var(--accent) 56%, var(--border));\n      background: color-mix(in srgb, var(--accent) 5%, white);\n      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent);\n    }\n\n    .card-select {\n      position: absolute;\n      top: 14px;\n      right: 14px;\n      width: 22px;\n      height: 22px;\n      border: 1px solid var(--border);\n      border-radius: 6px;\n      background: #FFFFFF;\n      color: #FFFFFF;\n      display: grid;\n      place-items: center;\n      padding: 0;\n    }\n\n    .source-card.is-selected .card-select {\n      border-color: var(--accent);\n      background: var(--accent);\n    }\n\n    .card-select svg {\n      width: 15px;\n      height: 15px;\n    }\n\n    .source-head {\n      display: grid;\n      gap: 8px;\n      padding-right: 30px;\n    }\n\n    .source-title {\n      margin: 0;\n      color: var(--fg);\n      font-size: 18px;\n      line-height: 1.2;\n      font-weight: 600;\n      letter-spacing: -0.01em;\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n\n    .source-subtitle {\n      color: var(--muted);\n      font-size: 12px;\n    }\n\n    .source-meta {\n      display: grid;\n      gap: 8px;\n      align-content: start;\n    }\n\n    .meta-row {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      gap: 10px;\n      min-height: 26px;\n      color: var(--muted);\n      font-size: 13px;\n    }\n\n    .meta-row strong {\n      color: var(--fg);\n      font-weight: 600;\n    }\n\n    .tag {\n      display: inline-flex;\n      align-items: center;\n      gap: 5px;\n      min-height: 24px;\n      border-radius: 999px;\n      border: 1px solid var(--border);\n      padding: 2px 8px;\n      background: #FFFFFF;\n      color: var(--muted);\n      font-size: 12px;\n      white-space: nowrap;\n    }\n\n    .tag-success {\n      color: var(--success);\n      border-color: color-mix(in srgb, var(--success) 30%, var(--border));\n      background: color-mix(in srgb, var(--success) 7%, white);\n    }\n\n    .tag-danger {\n      color: var(--danger);\n      border-color: color-mix(in srgb, var(--danger) 30%, var(--border));\n      background: color-mix(in srgb, var(--danger) 7%, white);\n    }\n\n    .tag-warn {\n      color: var(--warn);\n      border-color: color-mix(in srgb, var(--warn) 34%, var(--border));\n      background: color-mix(in srgb, var(--warn) 9%, white);\n    }\n\n    .source-actions {\n      display: flex;\n      align-items: center;\n      justify-content: flex-end;\n      gap: 8px;\n      flex-wrap: wrap;\n    }\n\n    .source-actions .btn {\n      min-height: 34px;\n      padding: 7px 11px;\n      font-size: 12px;\n    }\n\n    .footer-actions {\n      border-top: 1px solid var(--border);\n      background: color-mix(in srgb, var(--surface) 94%, var(--bg));\n      padding: 14px 32px;\n      display: flex;\n      justify-content: flex-end;\n      align-items: center;\n      gap: 10px;\n      min-width: 0;\n      overflow-x: auto;\n    }\n\n    .footer-actions .btn {\n      flex: 0 0 auto;\n      min-width: 118px;\n    }\n\n    .modal-layer {\n      position: fixed;\n      inset: 0;\n      display: none;\n      place-items: center;\n      padding: 32px;\n      background: rgba(17, 17, 17, 0.28);\n      z-index: 30;\n    }\n\n    .modal-layer.is-open { display: grid; }\n\n    .modal {\n      width: min(720px, 100%);\n      background: var(--surface);\n      border: 1px solid var(--border);\n      border-radius: 12px;\n      box-shadow: var(--modal-shadow);\n      overflow: hidden;\n      display: grid;\n      grid-template-rows: auto auto auto;\n    }\n\n    .modal-head {\n      padding: 18px 20px;\n      border-bottom: 1px solid var(--border);\n      display: flex;\n      align-items: flex-start;\n      justify-content: space-between;\n      gap: 16px;\n    }\n\n    .modal-title {\n      display: grid;\n      gap: 4px;\n    }\n\n    .modal-title h2 {\n      margin: 0;\n      font-size: 18px;\n      line-height: 1.2;\n      font-weight: 600;\n    }\n\n    .modal-title p {\n      margin: 0;\n      color: var(--muted);\n      font-size: 13px;\n    }\n\n    .close-button {\n      width: 34px;\n      height: 34px;\n      border: 1px solid var(--border);\n      border-radius: 8px;\n      background: var(--surface);\n      color: var(--muted);\n      display: grid;\n      place-items: center;\n      padding: 0;\n    }\n\n    .modal-body {\n      padding: 18px 20px;\n      display: grid;\n      grid-template-columns: repeat(2, minmax(0, 1fr));\n      gap: 12px;\n    }\n\n    .field {\n      display: grid;\n      gap: 6px;\n    }\n\n    .field.full {\n      grid-column: 1 / -1;\n    }\n\n    .field label {\n      color: var(--fg);\n      font-size: 12px;\n      font-weight: 600;\n    }\n\n    .required {\n      color: var(--danger);\n      margin-left: 2px;\n    }\n\n    .modal-body .input,\n    .modal-body .select {\n      width: 100%;\n    }\n\n    .masked-input {\n      font-family: ui-monospace, 'JetBrains Mono', monospace;\n      letter-spacing: 0;\n    }\n\n    .modal-actions {\n      border-top: 1px solid var(--border);\n      padding: 14px 20px;\n      display: flex;\n      justify-content: flex-end;\n      gap: 8px;\n      background: #FFFFFF;\n    }\n\n    @media (max-width: 1180px) {\n      body { overflow: auto; }\n\n      .app-shell { height: auto; }\n\n      .sidebar,\n      .main { height: auto; }\n\n      .datasource-grid {\n        grid-template-columns: repeat(2, minmax(0, 1fr));\n      }\n    }\n\n    @media (max-width: 900px) {\n      .app-shell,\n      .app-shell.is-collapsed {\n        min-height: 100dvh;\n        height: auto;\n        grid-template-columns: 1fr;\n      }\n\n      .sidebar {\n        min-height: auto;\n        border-right: 0;\n        border-bottom: 1px solid var(--border);\n        align-items: stretch;\n      }\n\n      .app-shell.is-collapsed .brand-row {\n        grid-template-columns: minmax(0, 1fr) 34px;\n        justify-items: stretch;\n      }\n\n      .app-shell.is-collapsed .brand-name,\n      .app-shell.is-collapsed .btn-label,\n      .app-shell.is-collapsed .nav-title,\n      .app-shell.is-collapsed .nav-label,\n      .app-shell.is-collapsed .sidebar-footnote {\n        display: initial;\n      }\n\n      .app-shell.is-collapsed .btn,\n      .app-shell.is-collapsed .nav-item {\n        width: auto;\n        height: auto;\n        min-height: 42px;\n        padding: 10px 14px;\n        margin: 0;\n      }\n\n      .app-shell.is-collapsed .nav-item {\n        grid-template-columns: 28px minmax(0, 1fr);\n        place-items: initial;\n      }\n\n      .content { padding: 24px 20px; }\n\n      .page-head { display: grid; }\n\n      .toolbar {\n        align-items: flex-start;\n        flex-direction: column;\n      }\n\n      .toolbar-left,\n      .toolbar-right {\n        width: 100%;\n      }\n\n      .input,\n      .select {\n        width: 100%;\n      }\n\n      .datasource-grid {\n        grid-template-columns: 1fr;\n      }\n\n      .footer-actions {\n        padding: 12px 16px;\n        justify-content: flex-end;\n        flex-wrap: wrap;\n        overflow-x: visible;\n      }\n\n      .footer-actions .btn { min-width: auto; }\n\n      .modal-body {\n        grid-template-columns: 1fr;\n      }\n    }\n  </style>\n</head>\n<body>\n  <main id=\"appShell\" class=\"app-shell\" aria-label=\"KM-MOM DataAgent 数据源配置页面\">\n    <aside class=\"sidebar\" aria-label=\"智能体配置导航\">\n      <div class=\"brand-row\">\n        <div class=\"brand-name\" aria-label=\"KM-MOM DataAgent\">\n          <span>KM-MOM</span>\n          <span>DataAgent</span>\n        </div>\n        <button id=\"collapseButton\" class=\"collapse-button\" type=\"butto lor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"/><path d=\"M9 13h6M9 16h4\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">业务知识配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"语义模型配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 8h12M8 13h8M10 18h4\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/><path d=\"M12 3v3M12 21v-3\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">语义模型配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"预设问题管理\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 7h12M6 12h8M6 17h10\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/><path d=\"M18 10l2 2-2 2\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg></span>\n            <span class=\"nav-label\">预设问题管理</span>\n          </button>\n        </div>\n      </section>\n\n      <div class=\"sidebar-footnote\">左侧导航切换右侧配置内容。</div>\n    </aside>\n\n    <section class=\"main\" aria-label=\"数据源配置内容区域\">\n      <section class=\"content\">\n        <div class=\"content-inner\">\n          <header class=\"page-head\">\n            <div class=\"page-title\">\n              <h1>数据源配置</h1>\n              <p>以卡片方式管理 Agent 可访问的数据源，支持多选后批量删除或初始化。</p>\n            </div>\n          </header>\n\n          <section class=\"toolbar\" aria-label=\"数据源筛选与批量操作\">\n            <div class=\"toolbar-left\">\n              <input class=\"input\" type=\"text\" placeholder=\"搜索数据源名称\">\n              <select class=\"select\" aria-label=\"连接状态\">\n                <option>全部连接</option>\n                <option>连接成功</option>\n                <option>              <div class=\"source-head\">\n                <h2 class=\"source-title\">质量追溯库</h2>\n                <div class=\"source-subtitle\">达梦 · 质量分析助手</div>\n              </div>\n              <div class=\"source-meta\">\n                <div class=\"meta-row\"><span>连接状态</span><span class=\"tag tag-danger\">连接失败</span></div>\n                <div class=\"meta-row\"><span>初始化</span><span class=\"tag tag-warn\">未初始化</span></div>\n                <div class=\"meta-row\"><span>状态</span><span class=\"tag enable-label\">未启用</span></div>\n              </div>\n              <div class=\"source-actions\">\n                <button class=\"btn btn-soft config-button\" type=\"button\">配置</button>\n                <button class=\"btn btn-secondary toggle-enable\" type=\"button\">启用</button>\n                <button class=\"btn btn-secondary test-button\" type=\"button\">测试连接</button>\n              </div>\n            </article>\n\n            <article class=\"source-card\" data-enabled=\"true\" data-name=\"设备点检库\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择设备点检库\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n                  <path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n                </svg>\n              </button>\n              <div class=\"source-head\">\n                <h2 class=\"source-title\">设备点检库</h2>\n                <div class=\"source-subtitle\">SQL Server · 设备问数助手</div>\n              </div>\n              <div class=\"source-meta\">\n                <div class=\"meta-row\"><span>连接状态</span><span class=\"tag tag-success\">连接成功</span></div>\n                <div class=\"meta-row\"><span>初始化</span><span class=\"tag tag-success\">已初始化</span></div>\n                <div class=\"meta-row\"><span>状态</span><span class=\"tag tag-success enable-label\">启用</span></div>\n              </div>\n              <div clas idden=\"true\">\n                  <path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n                </svg>\n              </button>\n              <div class=\"source-head\">\n                <h2 class=\"source-title\">历史归档库</h2>\n                <div class=\"source-subtitle\">MySQL · 历史数据查询</div>\n              </div>\n              <div class=\"source-meta\">\n                <div class=\"meta-row\"><span>连接状态</span><span class=\"tag tag-danger\">连接失败</span></div>\n                <div class=\"meta-row\"><span>初始化</span><span class=\"tag tag-warn\">未初始化</span></div>\n                <div class=\"meta-row\"><span>状态</span><span class=\"tag enable-label\">未启用</span></div>\n              </div>\n              <div class=\"source-actions\">\n                <button class=\"btn btn-soft config-button\" type=\"button\">配置</button>\n                <button class=\"btn btn-secondary toggle-enable\" type=\"button\">启用</button>\n                <button class=\"btn btn-secondary test-button\" type=\"button\">测试连接</button>\n              </div>\n            </article>\n          </section>\n        </div>\n      </section>\n\n      <footer class=\"footer-actions\" aria-label=\"底部操作区\">\n        <button id=\"addSourceButton\" class=\"btn btn-secondary\" type=\"button\">添加数据源</button>\n        <button id=\"initSourceButton\" class=\"btn btn-primary\" type=\"button\">初始化数据源</button>\n      </footer>\n    </section>\n  </main>\n\n  <div id=\"modalLayer\" class=\"modal-layer\" aria-hidden=\"true\">\n    <section class=\"modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"modalTitle\">\n      <header class=\"modal-head\">\n        <div class=\"modal-title\">\n          <h2 id=\"modalTitle\">配置数据源</h2>\n          <p id=\"modalDesc\">编辑数据源连接信息与启用状态。</p>\n        </div>\n        <button id=\"closeModal\" class=\"close-button\" type=\"button\" aria-label=\"关闭配置弹窗\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M7 7l10 10M17 7L7 17\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"/>\n          </svg>\n        </button>\n      </header>\n\n      <div class=\"modal-body\">\n        <div class=\"field\">\n          <label>数据源名称<span class=\"required\">*</span></label>\n          <input id=\"modalName\" class=\"input\" value=\"MOM 生产库\">\n        </div>\n        <div class=\"field\">\n          <label>数据库类型<span class=\"required\">*</span></label>\n          <select class=\"select\">\n            <option>MySQL</option>\n            <option>PostgreSQL</option>\n            <option>达梦</option>\n            <option>SQL Server</option>\n            <option>Oracle</option>\n          </select>\n        </div>\n        <div class=\"field\">\n          <label>主机地址<span class=\"required\">*</span></label>\n          <input class=\"input\" value=\"10.24.18.36\">\n        </div>\n        <div class=\"field\">\n          <label>端口<span class=\"required\">*</span></label>\n          <input class=\"input\" value=\"3306\">\n        </div>\n        <div class=\"field\">\n          <label>数据库名称<span class=\"required\">*</span></label>\n          <input class=\"input\" value=\"mom_prod\">\n        </div>\n        <div class=\"field\">\n          <label>用户名<span class=\"required\">*</span></label>\n          <input class=\"input\" value=\"mom_reader\">\n        </div>\n        <div class=\"field\">\n          <label>密码<span class=\"required\">*</span></label>\n          <input class=\"input masked-input\" value=\"••••••••••••\">\n        </div>\n        <div class=\"field\">\n          <label>状态</label>\n          <select class=\"select\">\n            <option>启用</option>\n            <option>未启用</option>\n          </select>\n        </div>\n      </div>\n\n      <footer class=\"modal-actions\">\n        <button id=\"cancelModal\" class=\"btn btn-secondary\" type=\"button\">取消</button>\n        <button class=\"btn btn-primary\" type=\"button\">保存</button>\n      </footer>\n    </section>\n  </div>\n\n  <script>\n    const appShell = document.getElementById('appShell');\n    const collapseButton = document.getElementById('collapseButton');\n    const selectionText = document.getElementById('selectionText');\n    const deleteSelected = document.getElementById('deleteSelected');\n    const initSelected = document.getElementById('initSelected');\n    const modalLayer = document.getElementById('modalLayer');\n    const modalTitle = document.getElementById('modalTitle');\n    const modalDesc = document.getElementById('modalDesc');\n    const modalName = document.getElementById('modalName');\n    const closeModal = document.getElementById('closeModal');\n    const cancelModal = document.getElementById('cancelModal');\n\n    collapseButton.addEventListener('click', () => {\n      const collapsed = appShell.classList.toggle('is-collapsed');\n      collapseButton.setAttribute('aria-expanded', String(!collapsed));\n      collapseButton.setAttribute('aria-label', collapsed ? '展开侧边栏' : '收起侧边栏');\n      collapseButton.setAttribute('title', collapsed ? '展开侧边栏' : '收起侧边栏');\n    });\n\n    function selectedCards() {\n      return Array.from(document.querySelectorAll('.source-card.is-selected'));\n    }\n\n    function syncSelection() {\n      const count = selectedCards().length;\n      selectionText.textContent = `已选择 ${count} 个数据源`;\n      deleteSelected.disabled = count === 0;\n      initSelected.disabled = count === 0;\n    }\n\n    document.querySelectorAll('.card-select').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        button.closest('.source-card').classList.toggle('is-selected');\n        syncSelection();\n      });\n    });\n\n    document.querySelectorAll('.source-card').forEach((card) => {\n      card.addEventListener('click', (event) => {\n        if (event.target.closest('button')) return;\n        card.classList.toggle('is-selected');\n        syncSelection();\n      });\n    });\n\n    document.querySelectorAll('.toggle-enable').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        const card = button.closest('.source-card');\n        const label = card.querySelector('.enable-label');\n        const enabled = card.dataset.enabled === 'true';\n\n        card.dataset.enabled = String(!enabled);\n        button.textContent = enabled ? '启用' : '禁用';\n        label.textContent = enabled ? '未启用' : '启用';\n        label.classList.toggle('tag-success', !enabled);\n      });\n    });\n\n    document.querySelectorAll('.test-button').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        button.textContent = '测试中';\n        button.disabled = true;\n        setTimeout(() => {\n          button.textContent = '测试连接';\n          button.disabled = false;\n        }, 800);\n      });\n    });\n\n    function openModal(card) {\n      const name = card ? card.dataset.name : '新数据源';\n      modalTitle.textContent = card ? '配置数据源' : '添加数据源';\n      modalDesc.textContent = card ? '编辑数据源连接信息与启用状态。' : '新增一个 Agent 可访问的数据源。';\n      modalName.value = name;\n      modalLayer.classList.add('is-open');\n      modalLayer.setAttribute('aria-hidden', 'false');\n    }\n\n    function hideModal() {\n      modalLayer.classList.remove('is-open');\n      modalLayer.setAttribute('aria-hidden', 'true');\n    }\n\n    document.querySelectorAll('.config-button').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        openModal(button.closest('.source-card'));\n      });\n    });\n\n    document.getElementById('addSourceButton').addEventListener('click', () => openModal(null));\n\n    document.getElementById('initSourceButton').addEventListener('click', () => {\n      const cards = selectedCards();\n      const targetCards : center;\n      background: var(--surface);\n      color: var(--muted);\n      padding: 0;\n    }\n\n    .collapse-button:hover {\n      color: var(--accent);\n      border-color: color-mix(in srgb, var(--accent) 36%, var(--border));\n    }\n\n    .primary-actions,\n    .nav-list {\n      display: grid;\n      gap: 10px;\n    }\n\n    .btn {\n      min-height: 38px;\n      border-radius: 8px;\n      border: 1px solid transparent;\n      padding: 9px 14px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      gap: 8px;\n      font-weight: 600;\n      white-space: nowrap;\n      background: var(--surface);\n      color: var(--fg);\n      line-height: 1.2;\n    }\n\n    .btn-primary {\n      background: var(--accent);\n      color: #FFFFFF;\n    }\n\n    .btn-secondary {\n      border-color: var(--border);\n    }\n\n    .btn-secondary:hover {\n      color: var(--accent);\n      border-color: color-mix(in srgb, var(--accent) 34%, var(--border));\n    }\n\n    .btn-soft {\n      background: color-mix(in srgb, var(--accent) 8%, white);\n      color: var(--accent);\n      border-color: color-mix(in srgb, var(--accent) 24%, var(--border));\n    }\n\n    .btn-danger {\n      color: var(--danger);\n      border-color: color-mix(in srgb, var(--danger) 28%, var(--border));\n      background: color-mix(in srgb, var(--danger) 6%, white);\n    }\n\n    .nav-block {\n      min-height: 0;\n      display: flex;\n      flex-direction: column;\n      gap: 10px;\n      flex: 1;\n      padding-top: 2px;\n    }\n\n    .nav-title {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      color: var(--muted);\n      font-size: 12px;\n      font-weight: 600;\n    }\n\n    .nav-list {\n      min-height: 0;\n      overflow-y: auto;\n      padding-right: 2px;\n    }\n\n    .nav-list::-webkit-scrollbar { width: 8px; }\n\n    .nav-list::-webkit-scrollbar-thumb {\n      background: #D6DDE8;\n      border-radius: 999p lass=\"nav-label\">语义模型配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"预设问题管理\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 7h12M6 12h8M6 17h10\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"></path><path d=\"M18 10l2 2-2 2\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg></span>\n            <span class=\"nav-label\">预设问题管理</span>\n          </button>\n        </div>\n      </section>\n\n      <div class=\"sidebar-footnote\">左侧导航切换右侧配置内容。</div>\n    </aside>\n\n    <section class=\"main\" aria-label=\"提示词配置内容区域\">\n      <section class=\"content\">\n        <div class=\"content-inner\">\n          <header class=\"page-head\">\n            <div class=\"page-title\">\n              <h1>提示词配置</h1>\n              <p>以长方形卡片维护 Agent 的角色、边界、输出格式、追问与拒答规则。</p>\n            </div>\n            <div class=\"save-state\">\n              <span class=\"status-dot\" aria-hidden=\"true\"></span>\n              <span>已保存 6 条提示词配置</span>\n            </div>\n          </header>\n\n          <section class=\"toolbar\" aria-label=\"提示词筛选与批量操作\">\n            <div class=\"toolbar-left\">\n              <input class=\"input\" type=\"text\" placeholder=\"搜索配置名称\">\n              <select class=\"select\" aria-label=\"启用状态\">\n                <option>全部状态</option>\n                <option>已启用</option>\n                <option>未启用</option>\n              </select>\n              <select class=\"select\" aria-label=\"优先级\">\n                <option>全部优先级</option>\n                <option>高</option>\n                <option>中</option>\n                <option>低</option>\n              </select>\n            </div>\n            <div class=\"toolbar-right\">\n              <span id=\"selectionText\" class=\"selection-text\">已选择 0 条提示词</span>\n              <button id=\"enableSelected\" class=\"btn btn-soft\" type=\"button\" disabled=\"\">启用所选</button>\n              <button id=\"disableSelected\" class=\"btn btn-secondary\" type=\"button\" disabled=\"\">停用所选</button>\n              <button id=\"deleteSelected\" class=\"btn btn-danger\" type=\"button\" disabled=\"\">删除所选</button>\n            </div>\n          </section>\n\n          <section class=\"prompt-list\" aria-label=\"提示词配置列表\">\n            <article class=\"prompt-card\" data-enabled=\"true\" data-title=\"MOM 问数角色设定\" data-priority=\"高\" data-order=\"01\">\n              <div class=\"prompt-top\">\n                <button class=\"card-select\" type=\"button\" aria-label=\"选择 MOM 问数角色设定\">\n                  <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n                </button>\n\n                <div class=\"prompt-heading\">\n                  <div class=\"title-line\">\n                    <h2 class=\"prompt-title\">MOM 问数角色设定</h2>\n                    <span class=\"tag tag-danger priority-label\">优先级：高</span>\n                    <span class=\"tag order-label\">序号：01</span>\n                  </div>\n                  <p class=\"prompt-desc\">定义 Agent 面向业务人员时的身份、语气和回答原则。</p>\n                </div>\n\n                <div class=\"prompt-actions\">\n                  <button class=\"btn btn-soft toggle-enable\" type=\"button\">已启用</button>\n                  <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                  <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n                </div>\n              </div>\n              <div class=\"prompt-content\">你是 MOM 智能问数助手，需要基于数据证据回答问题。对于无法计算、缺少字段或口径不明确的问题，应主动说明边界或发起追问。</div>\n            </article>\n\n            <article class=\"prompt-card\" data-enabled=\"true\" data-title=\"问数边界规则\" data-priority=\"高\" data-order=\"02\">\n              <div class=\"prompt-top\">\n                <button class=\"card-select\" type=\"button\" aria-label=\"选择 问数边界规则\">\n                  <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n                </button>\n\n                <div class=\"prompt-heading\">\n                  <div class=\"title-line\">\n                    <h2 class=\"prompt-title\">问数边界规则</h2>\n                    <span class=\"tag tag-danger priority-label\">优先级：高</span>\n                    <span class=\"tag order-label\">序号：02</span>\n                  </div>\n                  <p class=\"prompt-desc\">限制回答范围，避免超出 MOM 业务数据边界。</p>\n                </div>\n\n                <div class=\"prompt-actions\">\n                  <button class=\"btn btn-soft toggle-enable\" type=\"button\">已启用</button>\n                  <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                  <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n                </div>\n              </div>\n              <div class=\"prompt-content\">当用户问题超出工单、库存、设备、质量、生产进度等 MOM 业务范围时，不编造结论，应说明无法回答的原因，并建议用户补充可查询的业务范围。</div>\n            </article>\n\n            <article class=\"prompt-card\" data-enabled=\"true\" data-title=\"输出格式规则\" data-priority=\"中\" data-order=\"03\">\n              <div class=\"prompt-top\">\n                <button class=\"card-select\" type=\"button\" aria-label=\"选择 输出格式规则\">\n                  <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n                </button>\n\n                <div class=\"prompt-heading\">\n                  <div class=\"title-line\">\n                    <h2 class=\"prompt-title\">输出格式规则</h2>\n                    <span class=\"tag tag-warn priority-label\">优先级：中</span>\n                    <span class=\"tag order-label\">序号：03</span>\n                  </div>\n                  <p class=\"prompt-desc\">规定结果摘要、数据表、边界说明的展示顺序。</p>\n                </div>\n\n                <div class=\"prompt-actions\">\n                  <button class=\"btn btn-soft toggle-enable\" type=\"button\">已启用</button>\n                  <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                  <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n                </div>\n              </div>\n              <div class=\"prompt-content\">回答优先给出简短结论，再展示关键数据，最后补充统计范围、时间范围和业务口径边界。避免长篇解释，避免暴露技术实现细节。</div>\n            </article>\n\n            <article class=\"prompt-card\" data-enabled=\"true\" data-title=\"追问规则\" data-priority=\"高\" data-order=\"04\">\n              <div class=\"prompt-top\">\n                <button class=\"card-select\" type=\"button\" aria-label=\"选择 追问规则\">\n                  <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n                </button>\n\n                <div class=\"prompt-heading\">\n                  <div class=\"title-line\">\n                    <h2 class=\"prompt-title\">追问规则</h2>\n                    <span class=\"tag tag-danger priority-label\">优先级：高</span>\n                    <span class=\"tag order-label\">序号：04</span>\n                  </div>\n                  <p class=\"prompt-desc\">当时间、组织、口径不明确时主动追问。</p>\n                </div>\n\n                <div class=\"prompt-actions\">\n                  <button class=\"btn btn-soft toggle-enable\" type=\"button\">已启用</button>\n                  <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                  <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n                </div>\n              </div>\n              <div class=\"prompt-content\">当用户未说明时间范围、工厂范围、工单类型或统计口径时，应先提出一个简短追问，而不是直接生成不确定结果。</div>\n            </article>\n\n            <article class=\"prompt-card\" data-enabled=\"true\" data-title=\"拒答规则\" data-priority=\"高\" data-order=\"05\">\n              <div class=\"prompt-top\">\n                <button class=\"card-select\" type=\"button\" aria-label=\"选择 拒答规则\">\n                  <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n                </button>\n\n                <div class=\"prompt-heading\">\n                  <div class=\"title-line\">\n                    <h2 class=\"prompt-title\">拒答规则</h2>\n                    <span class=\"tag tag-danger priority-label\">优先级：高</span>\n                    <span class=\"tag order-label\">序号：05</span>\n                  </div>\n                  <p class=\"prompt-desc\">处理无权限、无数据或不适合回答的问题。</p>\n                </div>\n\n                <div class=\"prompt-actions\">\n                  <button class=\"btn btn-soft toggle-enable\" type=\"button\">已启用</button>\n                  <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                  <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n                </div>\n              </div>\n              <div class=\"prompt-content\">当问题涉及无权限数据、敏感信息、非业务问数内容，或系统无法获得可靠数据证据时，应明确拒答，并给出可继续查询的安全问题示例。</div>\n            </article>\n\n            <article class=\"prompt-card\" data-enabled=\"false\" data-title=\"示例问答补充\" data-priority=\"低\" data-order=\"06\">\n              <div class=\"prompt-top\">\n                <button class=\"card-select\" type=\"button\" aria-label=\"选择 示例问答补充\">\n                  <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>\n                </button>\n\n                <div class=\"prompt-heading\">\n                  <div class=\"title-line\">\n                    <h2 class=\"prompt-title\">示例问答补充</h2>\n                    <span class=\"tag priority-label\">优先级：低</span>\n                    <span class=\"tag order-label\">序号：06</span>\n                  </div>\n                  <p class=\"prompt-desc\">用于补充典型 MOM 问数问题和参考回答方式。</p>\n                </div>\n\n                <div class=\"prompt-actions\">\n                  <button class=\"btn btn-secondary toggle-enable\" type=\"button\">未启用</button>\n                  <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                  <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n                </div>\n              </div>\n              <div class=\"prompt-content\">示例：用户询问“按工单状态统计当前工单数量”时，应返回各状态数量、占比、统计范围，并提示当前数据更新时间。</div>\n            </article>\n          </section>\n        </div>\n      </section>\n\n      <footer class=\"footer-actions\" aria-label=\"底部操作区\">\n        <button id=\"addPromptButton\" class=\"btn btn-secondary\" type=\"button\">添加提示词</button>\n        \n      </footer>\n    </section>\n  </main>\n\n  <div id=\"modalLayer\" class=\"modal-layer\" aria-hidden=\"true\">\n    <section class=\"modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"modalTitle\">\n      <header class=\"modal-head\">\n        <div class=\"modal-title\">\n          <h2 id=\"modalTitle\">编辑提示词</h2>\n          <p id=\"modalDesc\">维护提示词配置名称、描述、内容、优先级和序号。</p>\n        </div>\n        <button id=\"closeModal\" class=\"close-button\" type=\"button\" aria-label=\"关闭配置弹窗\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M7 7l10 10M17 7L7 17\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"></path>\n          </svg>\n        </button>\n      </header>\n\n      <div class=\"modal-body\">\n        <div class=\"field\">\n          <label>配置名称<span class=\"required\">*</span></label>\n          <input id=\"modalName\" class=\"input\" value=\"MOM 问数角色设定\">\n        </div>\n        <div class=\"field\">\n          <label>优先级<span class=\"required\">*</span></label>\n          <select id=\"modalPriority\" class=\"select\">\n            <option>高</option>\n            <option>中</option>\n            <option>低</option>\n          </select>\n        </div>\n        <div class=\"field\">\n          <label>提示词序号<span class=\"required\">*</span></label>\n          <input id=\"modalOrder\" class=\"input\" value=\"01\">\n        </div>\n        <div class=\"field\">\n          <label>启用状态</label>\n          <select id=\"modalEnabled\" class=\"select\">\n            <option>已启用</option>\n            <option>未启用</option>\n          </select>\n        </div>\n        <div class=\"field full\">\n          <label>配置描述</label>\n          <input id=\"modalDescInput\" class=\"input\" value=\"定义 Agent 面向业务人员时的身份、语气和回答原则。\">\n        </div>\n        <div class=\"field full\">\n          <label>提示词内容<span class=\"required\">*</span></label>\n          <textarea id=\"modalContent\" class=\"textarea\">你是 MOM 智能问数助手，需要基于数据证据回答问题。对于无法计算、缺少字段或口径不明确的问题，应主动说明边界或发起追问。</textarea>\n        </div>\n      </div>\n\n      <footer class=\"modal-actions\">\n        <button id=\"cancelModal\" class=\"btn btn-secondary\" type=\"button\">取消</button>\n        <button id=\"saveModal\" class=\"btn btn-primary\" type=\"button\">保存</button>\n      </footer>\n    </section>\n  </div>\n\n  <script>\n    const appShell = document.getElementById('appShell');\n    const collapseButton = document.getElementById('collapseButton');\n    const selectionText = document.getElementById('selectionText');\n    const enableSelected = document.getElementById('enableSelected');\n    const disableSelected = document.getElementById('disableSelected');\n    const deleteSelected = document.getElementById('deleteSelected');\n    const modalLayer = document.getElementById('modalLayer');\n    const modalTitle = document.getElementById('modalTitle');\n    const modalName = document.getElementById('modalName');\n    const modalPriority = document.getElementById('modalPriority');\n    const modalOrder = document.getElementById('modalOrder');\n    const modalEnabled = document.getElementById('modalEnabled');\n    const modalDescInput = document.getElementById('modalDescInput');\n    const modalContent = document.getElementById('modalContent');\n    const closeModal = document.getElementById('closeModal');\n    const cancelModal = document.getElementById('cancelModal');\n    const saveModal = document.getElementById('saveModal');\n\n    let editingCard = null;\n\n    collapseButton.addEventListener('click', () => {\n      const collapsed = appShell.classList.toggle('is-collapsed');\n      collapseButton.setAttribute('aria-expanded', String(!collapsed));\n      collapseButton.setAttribute('aria-label', collapsed ? '展开侧边栏' : '收起侧边栏');\n      collapseButton.setAttribute('title', collapsed ? '展开侧边栏' : '收起侧边栏');\n    });\n\n    function selectedCards() {\n      return Array.from(document.querySelectorAll('.prompt-card.is-selected'));\n    }\n\n    function syncSelection() {\n      const count = selectedCards().length;\n      selectionText.textContent = `已选择 ${count} 条提示词`;\n      enableSelected.disabled = count === 0;\n      disableSelected.disabled = count === 0;\n      deleteSelected.disabled = count === 0;\n    }\n\n    function setCardEnabled(card, enabled) {\n      const button = card.querySelector('.toggle-enable');\n      card.dataset.enabled = String(enabled);\n      button.textContent = enabled ? '已启用' : '未启用';\n      button.classList.toggle('btn-soft', enabled);\n      button.classList.toggle('btn-secondary', !enabled);\n    }\n\n    function priorityTagClass(priority) {\n      if (priority === '高') return 'tag tag-danger priority-label';\n      if (priority === '中') return 'tag tag-warn priority-label';\n      return 'tag priority-label';\n    }\n\n    document.querySelectorAll('.card-select').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        button.closest('.prompt-card').classList.toggle('is-selected');\n        syncSelection();\n      });\n    });\n\n    document.querySelectorAll('.prompt-card').forEach((card) => {\n      card.addEventListener('click', (event) => {\n        if (event.target.closest('button')) return;\n        card.classList.toggle('is-selected');\n        syncSelection();\n      });\n    });\n\n    document.querySelectorAll('.toggle-enable').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        const card = button.closest('.prompt-card');\n        setCardEnabled(card, card.dataset.enabled !== 'true');\n      });\n    });\n\n    document.querySelectorAll('.delete-button').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        button.closest('.prompt-card').remove();\n        syncSelection();\n      });\n    });\n\n    function openModal(card) {\n      editingCard = card;\n      const isNew = !card;\n      modalTitle.textContent = isNew ? '添加提示词' : '编辑提示词';\n\n      modalName.value = isNew ? '新提示词配置' : card.dataset.title;\n      modalPriority.value = isNew ? '中' : card.dataset.priority;\n      modalOrder.value = isNew ? '07' : card.dataset.order;\n      modalEnabled.value = isNew || card.dataset.enabled === 'true' ? '已启用' : '未启用';\n      modalDescInput.value = isNew ? '补充说明该提示词的使用场景。' : card.querySelector('.prompt-desc').textContent;\n      modalContent.value = isNew ? '请输入提示词内容。' : card.querySelector('.prompt-content').textContent;\n\n      modalLayer.classList.add('is-open');\n      modalLayer.setAttribute('aria-hidden', 'false');\n    }\n\n    function hideModal() {\n      modalLayer.classList.remove('is-open');\n      modalLayer.setAttribute('aria-hidden', 'true');\n    }\n\n    document.querySelectorAll('.edit-button').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        openModal(button.closest('.prompt-card'));\n      });\n    });\n\n    document.getElementById('addPromptButton').addEventListener('click', () => openModal(null));\n\n    enableSelected.addEventListener('click', () => {\n      selectedCards().forEach((card) => setCardEnabled(card, true));\n    });\n\n    disableSelected.addEventListener('click', () => {\n      selectedCards().forEach((card) => setCardEnabled(card, false));\n    });\n\n    deleteSelected.addEventListener('click', () => {\n      selectedCards().forEach((card) => card.remove());\n      syncSelection();\n    });\n\n    saveModal.addEventListener('click', () => {\n      if (!editingCard) {\n        hideModal();\n        return;\n      }\n\n      editingCard.dataset.title = modalName.value;\n      editingCard.dataset.priority = modalPriority.value;\n      editingCard.dataset.order = modalOrder.value;\n\n      editingCard.querySelector('.prompt-title').textContent = modalName.value;\n      editingCard.querySelector('.prompt-desc').textContent = modalDescInput.value;\n      editingCard.querySelector('.prompt-content').textContent = modalContent.value;\n\n      const priorityLabel = editingCard.querySelector('.priority-label');\n      priorityLabel.textContent = `优先级：${modalPriority.value}`;\n      priorityLabel.className = priorityTagClass(modalPriority.value);\n\n      editingCard.querySelector('.order-label').textContent = `序号：${modalOrder.value}`;\n      setCardEnabled(editingCard, modalEnabled.value === '已启用');\n\n      hideModal();\n    });\n\n    closeModal.addEventListener('click', hideModal);\n    cancelModal.addEventListener('click', hideModal);\n\n    modalLayer.addEventListener('click', (event) => {\n      if (event.target === modalLayer) hideModal();\n    });\n\n    document.addEventListener('keydown', (event) => {\n      if (event.key === 'Escape') hideModal();\n    });\n\n    syncSelection();\n  <\/script>\n\n\n</body></html>","skill":"\n<!doctype html>\n<html lang=\"zh-CN\">\n<head>\n  <meta charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n  <title>KM-MOM DataAgent - Skill 管理</title>\n  <style>\n    :root {\n      --bg: #FAFAFA;\n      --fg: #111111;\n      --surface: #FFFFFF;\n      --muted: #6B6B6B;\n      --border: #E5E5E5;\n      --accent: #2F6FEB;\n      --success: #17A34A;\n      --warn: #EAB308;\n      --danger: #DC2626;\n      --sidebar: #F4F7FC;\n      --sidebar-strong: #EAF1FF;\n      --modal-shadow: 0 16px 48px rgba(17, 17, 17, 0.18);\n      --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;\n      --sidebar-width: 288px;\n    }\n\n    * { box-sizing: border-box; }\n\n    html,\n    body {\n      min-height: 100%;\n      margin: 0;\n      background: var(--bg);\n      color: var(--fg);\n      font-family: var(--font);\n      font-size: 14px;\n      line-height: 1.5;\n    }\n\n    body { overflow: hidden; }\n\n    button,\n    input,\n    select,\n    textarea {\n      font: inherit;\n    }\n\n    button { cursor: pointer; }\n\n    button:disabled {\n      cursor: not-allowed;\n      opacity: 0.58;\n    }\n\n    svg {\n      width: 18px;\n      height: 18px;\n      display: block;\n      flex: 0 0 auto;\n    }\n\n    .app-shell {\n      width: 100vw;\n      height: 100dvh;\n      min-height: 720px;\n      display: grid;\n      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);\n      background: var(--bg);\n      transition: grid-template-columns 180ms ease;\n    }\n\n    .app-shell.is-collapsed { --sidebar-width: 76px; }\n\n    .sidebar {\n      height: 100dvh;\n      min-height: 720px;\n      background: var(--sidebar);\n      border-right: 1px solid var(--border);\n      display: flex;\n      flex-direction: column;\n      padding: 18px 14px;\n      gap: 16px;\n      min-width: 0;\n    }\n\n    .brand-row {\n      display: grid;\n      grid-template-columns: minmax(0, 1fr) 34px;\n      align-items: center;\n      gap: 10px;\n      min-height: 48px;\n    }\n\n    .brand-name {\n      min-width: 0;\n      font-weight: 600;\n      line-height: 1.15;\n      letter-spacing: -0.01em;\n      color: var(--fg);\n    }\n\n    .brand-name span {\n      display: block;\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n\n    .brand-name span:first-child { font-size: 19px; }\n\n    .brand-name span:last-child {\n      margin-top: 2px;\n      font-size: 17px;\n      color: color-mix(in srgb, var(--fg) 82%, var(--muted));\n    }\n\n    .collapse-button {\n      width: 34px;\n      height: 34px;\n      border: 1px solid var(--border);\n      border-radius: 8px;\n      display: grid;\n      place-items: center;\n      background: var(--surface);\n      color: var(--muted);\n      padding: 0;\n    }\n\n    .collapse-button:hover {\n      color: var(--accent);\n      border-color: color-mix(in srgb, var(--accent) 36%, var(--border));\n    }\n\n    .primary-actions,\n    .nav-list {\n      display: grid;\n      gap: 10px;\n    }\n\n    .btn {\n      min-height: 38px;\n      border-radius: 8px;\n      border: 1px solid transparent;\n      padding: 9px 14px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      gap: 8px;\n      font-weight: 600;\n      white-space: nowrap;\n      background: var(--surface);\n      color: var(--fg);\n      line-height: 1.2;\n    }\n\n    .btn-primary {\n      background: var(--accent);\n      color: #FFFFFF;\n    }\n\n    .btn-secondary {\n      border-color: var(--border);\n    }\n\n    .btn-secondary:hover {\n      color: var(--accent);\n      border-color: color-mix(in srgb, var(--accent) 34%, var(--border));\n    }\n\n    .btn-soft {\n      background: color-mix(
