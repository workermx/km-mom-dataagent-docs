          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"业务知识配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 8h16M6 8v11h12V8M9 8V5h6v3\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"/><path d=\"M9 13h6M9 16h4\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">业务知识配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"语义模型配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 8h12M8 13h8M10 18h4\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/><path d=\"M12 3v3M12 21v-3\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">语义模型配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"预设问题管理\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 7h12M6 12h8M6 17h10\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/><path d=\"M18 10l2 2-2 2\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg></span>\n            <span class=\"nav-label\">预设问题管理</span>\n          </button>\n        </div>\n      </section>\n\n      <div class=\"sidebar-footnote\">左侧导航切换右侧配置内容。</div>\n    </aside>\n\n    <section class=\"main\" aria-label=\"Skill 管理内容区域\">\n      <section class=\"content\">\n        <div class=\"content-inner\">\n          <header class=\"page-head\">\n            <div class=\"page-title\">\n              <h1>Skill 管理</h1>\n              <p>导入、启用和维护智能问数 Agent 可调用的 Skill 能力包。</p>\n            </div>\n            <div class=\"save-state\">\n              <span class=\"status-dot\" aria-hidden=\"true\"></span>\n              <span>已加载 6 个 Skill</span>\n            </div>\n          </header>\n\n          <section class=\"toolbar\" aria-label=\"Skill 筛选与批量操作\">\n            <div class=\"toolbar-left\">\n              <input id=\"searchInput\" class=\"input\" type=\"text\" placeholder=\"搜索 Skill 名称\">\n              <select id=\"statusFilter\" class=\"select\" aria-label=\"状态筛选\">\n                <option value=\"all\">全部状态</option>\n                <option value=\"enabled\">已启用</option>\n                <option value=\"disabled\">未启用</option>\n              </select>\n            </div>\n            <div class=\"toolbar-right\">\n              <span id=\"selectionText\" class=\"selection-text\">已选择 0 个 Skill</span>\n              <button id=\"enableSelected\" class=\"btn btn-soft\" type=\"button\" disabled>启用所选</button>\n              <button id=\"disableSelected\" class=\"btn btn-secondary\" type=\"button\" disabled>停用所选</button>\n              <button id=\"deleteSelected\" class=\"btn btn-danger\" type=\"button\" disabled>删除所选</button>\n            </div>\n          </section>\n\n          <section class=\"skill-grid\" aria-label=\"Skill 卡片列表\">\n            <article class=\"skill-card\" data-enabled=\"true\" data-title=\"MOM 工单问数\" data-desc=\"面向工单状态、工单数量、生产进度和完工情况的问数能力。\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 MOM 工单问数\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"skill-head\">\n                <h2 class=\"skill-title\">MOM 工单问数</h2>\n                <div class=\"skill-status-line\">\n                  <span class=\"tag tag-success status-tag\">已启用</span>\n                  <span class=\"tag\">来源：本地导入</span>\n                </div>\n              </div>\n              <p class=\"skill-desc\">面向工单状态、工单数量、生产进度和完工情况的问数能力。</p>\n              <div class=\"skill-actions\">\n                <button class=\"btn btn-soft toggle-enable\" type=\"button\">已启用</button>\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n\n            <article class=\"skill-card\" data-enabled=\"true\" data-title=\"库存风险分析\" data-desc=\"支持低于安全库存、缺料风险、到货进度和库存周转相关问数。\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 库存风险分析\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"skill-head\">\n                <h2 class=\"skill-title\">库存风险分析</h2>\n                <div class=\"skill-status-line\">\n                  <span class=\"tag tag-success status-tag\">已启用</span>\n                  <span class=\"tag\">来源：本地导入</span>\n                </div>\n              </div>\n              <p class=\"skill-desc\">支持低于安全库存、缺料风险、到货进度和库存周转相关问数。</p>\n              <div class=\"skill-actions\">\n                <button class=\"btn btn-soft toggle-enable\" type=\"button\">已启用</button>\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n\n            <article class=\"skill-card\" data-enabled=\"true\" data-title=\"设备停机分析\" data-desc=\"用于统计设备停机时长、停机原因、班组影响和设备异常趋势。\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 设备停机分析\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"skill-head\">\n                <h2 class=\"skill-title\">设备停机分析</h2>\n                <div class=\"skill-status-line\">\n                  <span class=\"tag tag-success status-tag\">已启用</span>\n                  <span class=\"tag\">来源：本地导入</span>\n                </div>\n              </div>\n              <p class=\"skill-desc\">用于统计设备停机时长、停机原因、班组影响和设备异常趋势。</p>\n              <div class=\"skill-actions\">\n                <button class=\"btn btn-soft toggle-enable\" type=\"button\">已启用</button>\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n\n            <article class=\"skill-card\" data-enabled=\"false\" data-title=\"质量异常追溯\" data-desc=\"按工序、批次、物料和时间范围追踪质量异常数量与分布。\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 质量异常追溯\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"skill-head\">\n                <h2 class=\"skill-title\">质量异常追溯</h2>\n                <div class=\"skill-status-line\">\n                  <span class=\"tag status-tag\">未启用</span>\n                  <span class=\"tag\">来源：外部文件夹</span>\n                </div>\n              </div>\n              <p class=\"skill-desc\">按工序、批次、物料和时间范围追踪质量异常数量与分布。</p>\n              <div class=\"skill-actions\">\n                <button class=\"btn btn-secondary toggle-enable\" type=\"button\">未启用</button>\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n\n            <article class=\"skill-card\" data-enabled=\"true\" data-title=\"生产达成率汇总\" data-desc=\"支持计划数量、实际产量、达成率、班组对比等业务分析能力。\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 生产达成率汇总\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"skill-head\">\n                <h2 class=\"skill-title\">生产达成率汇总</h2>\n                <div class=\"skill-status-line\">\n                  <span class=\"tag tag-success status-tag\">已启用</span>\n                  <span class=\"tag\">来源：本地导入</span>\n                </div>\n              </div>\n              <p class=\"skill-desc\">支持计划数量、实际产量、达成率、班组对比等业务分析能力。</p>\n              <div class=\"skill-actions\">\n                <button class=\"btn btn-soft toggle-enable\" type=\"button\">已启用</button>\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n\n            <article class=\"skill-card\" data-enabled=\"false\" data-title=\"仓库库存查询\" data-desc=\"提供仓库、库位、物料、安全库存和在途数量相关的查询能力。\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 仓库库存查询\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"skill-head\">\n                <h2 class=\"skill-title\">仓库库存查询</h2>\n                <div class=\"skill-status-line\">\n                  <span class=\"tag status-tag\">未启用</span>\n                  <span class=\"tag\">来源：外部文件夹</span>\n                </div>\n              </div>\n              <p class=\"skill-desc\">提供仓库、库位、物料、安全库存和在途数量相关的查询能力。</p>\n              <div class=\"skill-actions\">\n                <button class=\"btn btn-secondary toggle-enable\" type=\"button\">未启用</button>\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n          </section>\n        </div>\n      </section>\n\n      <footer class=\"footer-actions\" aria-label=\"底部操作区\">\n        <button id=\"importSkillButton\" class=\"btn btn-primary\" type=\"button\">导入 Skill</button>\n        <input id=\"folderInput\" class=\"hidden-file\" type=\"file\" webkitdirectory directory multiple>\n      </footer>\n    </section>\n  </main>\n\n  <div id=\"modalLayer\" class=\"modal-layer\" aria-hidden=\"true\">\n    <section class=\"modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"modalTitle\">\n      <header class=\"modal-head\">\n        <div class=\"modal-title\">\n          <h2 id=\"modalTitle\">编辑 Skill</h2>\n          <p id=\"modalDesc\">维护 Skill 名称、描述，并管理源文件导出或更新导入。</p>\n        </div>\n        <button id=\"closeModal\" class=\"close-button\" type=\"button\" aria-label=\"关闭编辑弹窗\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M7 7l10 10M17 7L7 17\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"/>\n          </svg>\n        </button>\n      </header>\n\n      <div class=\"modal-body\">\n        <div class=\"field\">\n          <label>Skill 名称<span class=\"required\">*</span></label>\n          <input id=\"modalName\" class=\"input\" value=\"MOM 工单问数\">\n        </div>\n        <div class=\"field\">\n          <label>Skill 描述<span class=\"required\">*</span></label>\n          <textarea id=\"modalDescInput\" class=\"textarea\">面向工单状态、工单数量、生产进度和完工情况的问数能力。</textarea>\n        </div>\n\n        <div class=\"source-box\" aria-label=\"源文件管理\">\n          <div class=\"source-row\">\n            <span>源文件夹</span>\n            <strong id=\"sourceName\">mom-work-order-skill/</strong>\n          </div>\n          <div class=\"source-row\">\n            <span>最近更新</span>\n            <strong>今天 11:42</strong>\n          </div>\n          <div class=\"source-actions\">\n            <button id=\"exportSourceButton\" class=\"btn btn-secondary\" type=\"button\">导出源文件</button>\n            <button id=\"updateImportButton\" class=\"btn btn-soft\" type=\"button\">更新导入</button>\n            <input id=\"updateFolderInput\" class=\"hidden-file\" type=\"file\" webkitdirectory directory multiple>\n          </div>\n        </div>\n      </div>\n\n      <footer class=\"modal-actions\">\n        <button id=\"cancelModal\" class=\"btn btn-secondary\" type=\"button\">取消</button>\n        <button id=\"saveModal\" class=\"btn btn-primary\" type=\"button\">保存</button>\n      </footer>\n    </section>\n  </div>\n\n  <script>\n    const appShell = document.getElementById('appShell');\n    const collapseButton = document.getElementById('collapseButton');\n    const selectionText = document.getElementById('selectionText');\n    const enableSelected = document.getElementById('enableSelected');\n    const disableSelected = document.getElementById('disableSelected');\n    const deleteSelected = document.getElementById('deleteSelected');\n    const modalLayer = document.getElementById('modalLayer');\n    const modalTitle = document.getElementById('modalTitle');\n    const modalName = document.getElementById('modalName');\n    const modalDescInput = document.getElementById('modalDescInput');\n    const sourceName = document.getElementById('sourceName');\n    const closeModal = document.getElementById('closeModal');\n    const cancelModal = document.getElementById('cancelModal');\n    const saveModal = document.getElementById('saveModal');\n    const importSkillButton = document.getElementById('importSkillButton');\n    const folderInput = document.getElementById('folderInput');\n    const updateImportButton = document.getElementById('updateImportButton');\n    const updateFolderInput = document.getElementById('updateFolderInput');\n    const exportSourceButton = document.getElementById('exportSourceButton');\n    const searchInput = document.getElementById('searchInput');\n    const statusFilter = document.getElementById('statusFilter');\n\n    let editingCard = null;\n\n    collapseButton.addEventListener('click', () => {\n      const collapsed = appShell.classList.toggle('is-collapsed');\n      collapseButton.setAttribute('aria-expanded', String(!collapsed));\n      collapseButton.setAttribute('aria-label', collapsed ? '展开侧边栏' : '收起侧边栏');\n      collapseButton.setAttribute('title', collapsed ? '展开侧边栏' : '收起侧边栏');\n    });\n\n    function selectedCards() {\n      return Array.from(document.querySelectorAll('.skill-card.is-selected'));\n    }\n\n    function syncSelection() {\n      const count = selectedCards().length;\n      selectionText.textContent = `已选择 ${count} 个 Skill`;\n      enableSelected.disabled = count === 0;\n      disableSelected.disabled = count === 0;\n      deleteSelected.disabled = count === 0;\n    }\n\n    function applyFilters() {\n      const keyword = searchInput.value.trim().toLowerCase();\n      const status = statusFilter.value;\n\n      document.querySelectorAll('.skill-card').forEach((card) => {\n        const title = (card.dataset.title || '').toLowerCase();\n        const enabled = card.dataset.enabled === 'true';\n        const matchKeyword = !keyword || title.includes(keyword);\n        const matchStatus =\n          status === 'all' ||\n          (status === 'enabled' && enabled) ||\n          (status === 'disabled' && !enabled);\n\n        card.classList.toggle('is-hidden', !(matchKeyword && matchStatus));\n      });\n    }\n\n    function setCardEnabled(card, enabled) {\n      const button = card.querySelector('.toggle-enable');\n      const statusTag = card.querySelector('.status-tag');\n\n      card.dataset.enabled = String(enabled);\n      button.textContent = enabled ? '已启用' : '未启用';\n      statusTag.textContent = enabled ? '已启用' : '未启用';\n\n      button.classList.toggle('btn-soft', enabled);\n      button.classList.toggle('btn-secondary', !enabled);\n      statusTag.classList.toggle('tag-success', enabled);\n      applyFilters();\n    }\n\n    document.querySelectorAll('.card-select').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        button.closest('.skill-card').classList.toggle('is-selected');\n        syncSelection();\n      });\n    });\n\n    document.querySelectorAll('.skill-card').forEach((card) => {\n      card.addEventListener('click', (event) => {\n        if (event.target.closest('button')) return;\n        card.classList.toggle('is-selected');\n        syncSelection();\n      });\n    });\n\n    document.querySelectorAll('.toggle-enable').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        const card = button.closest('.skill-card');\n        setCardEnabled(card, card.dataset.enabled !== 'true');\n      });\n    });\n\n    document.querySelectorAll('.delete-button').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        button.closest('.skill-card').remove();\n        syncSelection();\n      });\n    });\n\n    function openModal(card) {\n      editingCard = card;\n      const title = card ? card.dataset.title : '新导入 Skill';\n      const desc = card ? card.dataset.desc : '请填写 Skill 描述。';\n\n      modalTitle.textContent = card ? '编辑 Skill' : '导入 Skill';\n      modalName.value = title;\n      modalDescInput.value = desc;\n      sourceName.textContent = title.toLowerCase().replace(/\\s+/g, '-').replace(/[^\\u4e00-\\u9fa5a-z0-9-]/gi, '') + '/';\n\n      modalLayer.classList.add('is-open');\n      modalLayer.setAttribute('aria-hidden', 'false');\n    }\n\n    function hideModal() {\n      modalLayer.classList.remove('is-open');\n      modalLayer.setAttribute('aria-hidden', 'true');\n    }\n\n    document.querySelectorAll('.edit-button').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        openModal(button.closest('.skill-card'));\n      });\n    });\n\n    enableSelected.addEventListener('click', () => {\n      selectedCards().forEach((card) => setCardEnabled(card, true));\n      syncSelection();\n    });\n\n    disableSelected.addEventListener('click', () => {\n      selectedCards().forEach((card) => setCardEnabled(card, false));\n      syncSelection();\n    });\n\n    deleteSelected.addEventListener('click', () => {\n      selectedCards().forEach((card) => card.remove());\n      syncSelection();\n    });\n\n    searchInput.addEventListener('input', applyFilters);\n    statusFilter.addEventListener('change', applyFilters);\n\n    importSkillButton.addEventListener('click', () => {\n      folderInput.click();\n    });\n\n    folderInput.addEventListener('change', () => {\n      openModal(null);\n      if (folderInput.files.length) {\n        const firstPath = folderInput.files[0].webkitRelativePath || '';\n        const folder = firstPath.split('/')[0] || '外部 Skill 文件夹';\n        modalName.value = folder;\n        modalDescInput.value = '从外部文件夹导入的 Skill，请补充能力说明。';\n        sourceName.textContent = folder + '/';\n      }\n    });\n\n    updateImportButton.addEventListener('click', () => {\n      updateFolderInput.click();\n    });\n\n    updateFolderInput.addEventListener('change', () => {\n      if (updateFolderInput.files.length) {\n        const firstPath = updateFolderInput.files[0].webkitRelativePath || '';\n        const folder = firstPath.split('/')[0] || '已更新源文件夹';\n        sourceName.textContent = folder + '/';\n      }\n    });\n\n    exportSourceButton.addEventListener('click', () => d\" stroke-linejoin=\"round\"/>\n          </svg>\n          <span class=\"btn-label\">前往运行页面</span>\n        </button>\n        <button class=\"btn btn-secondary\" type=\"button\" title=\"访问 API\" aria-label=\"访问 API\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M8 9l-3 3 3 3M16 9l3 3-3 3M14 5l-4 14\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n          </svg>\n          <span class=\"btn-label\">访问 API</span>\n        </button>\n      </div>\n\n      <section class=\"nav-block\" aria-label=\"配置导航\">\n        <div class=\"nav-title\">\n          <span>智能体配置</span>\n          <span>8 项</span>\n        </div>\n\n        <div class=\"nav-list\">\n          <button class=\"nav-item\" type=\"button\" title=\"模型配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 7h12M6 12h12M6 17h8\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">模型配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"数据源配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 7c0-1.7 3.1-3 7-3s7 1.3 7 3-3.1 3-7 3-7-1.3-7-3Z\" stroke=\"currentColor\" stroke-width=\"1.5\"/><path d=\"M5 7v5c0 1.7 3.1 3 7 3s7-1.3 7-3V7M5 12v5c0 1.7 3.1 3 7 3s7-1.3 7-3v-5\" stroke=\"currentColor\" stroke-width=\"1.5\"/></svg></span>\n            <span class=\"nav-label\">数据源配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"提示词配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 6h14M5 11h14M5 16h8\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/><path d=\"M16 16l2 2 3-4\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg></span>\n            <span class=\"nav-label\">提示词配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"Skill 管理\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M8 4h8v5H8V4ZM5 13h6v7H5v-7ZM13 13h6v7h-6v-7Z\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"/><path d=\"M12 9v2M8 13v-2h8v2\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">Skill 管理</span>\n          </button>\n\n          <button class=\"nav-item is-active\" type=\"button\" title=\"智能体知识配置\" aria-current=\"page\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M7 5h8l2 2v12H7V5Z\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"/><path d=\"M10 10h4M10 14h5\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">智能体知识配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"业务知识配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 8h16M6 8v11h12V8M9 8V5h6v3\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"/><path d=\"M9 13h6M9 16h4\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">业务知识配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"语义模型配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 8h12M8 13h8M10 18h4\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/><path d=\"M12 3v3M12 21v-3\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">语义模型配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"预设问题管理\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 7h12M6 12h8M6 17h10\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/><path d=\"M18 10l2 2-2 2\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg></span>\n            <span class=\"nav-label\">预设问题管理</span>\n          </button>\n        </div>\n      </section>\n\n      <div class=\"sidebar-footnote\">左侧导航切换右侧配置内容。</div>\n    </aside>\n\n    <section class=\"main\" aria-label=\"智能体知识内容区域\">\n      <section class=\"content\">\n        <div class=\"content-inner\">\n          <header class=\"page-head\">\n            <div class=\"page-title\">\n              <h1>智能体知识配置</h1>\n              <p>管理 Agent 可参考的文档、问答对和常见问题知识。</p>\n            </div>\n            <div class=\"save-state\">\n              <span class=\"status-dot\" aria-hidden=\"true\"></span>\n              <span>已维护 6 条知识</span>\n            </div>\n          </header>\n\n          <section class=\"toolbar\" aria-label=\"智能体知识筛选与批量操作\">\n            <div class=\"toolbar-left\">\n              <input id=\"searchInput\" class=\"input\" type=\"text\" placeholder=\"搜索知识标题\">\n              <select id=\"typeFilter\" class=\"select\" aria-label=\"知识类型筛选\">\n                <option value=\"all\">全部类型</option>\n                <option value=\"文档\">文档</option>\n                <option value=\"问答对\">问答对</option>\n                <option value=\"常见问题\">常见问题</option>\n              </select>\n            </div>\n            <div class=\"toolbar-right\">\n              <span id=\"selectionText\" class=\"selection-text\">已选择 0 条知识</span>\n              <button id=\"deleteSelected\" class=\"btn btn-danger\" type=\"button\" disabled>删除所选</button>\n            </div>\n          </section>\n\n          <section class=\"knowledge-grid\" aria-label=\"智能体知识卡片列表\">\n            <article class=\"knowledge-card\" data-type=\"文档\" data-title=\"MOM 工单业务说明\" data-desc=\"说明工单状态、工单数量、完工进度、异常工单等业务口径。\" data-chunk=\"递归分块\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 MOM 工单业务说明\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"knowledge-head\">\n                <h2 class=\"knowledge-title\">MOM 工单业务说明</h2>\n                <div class=\"knowledge-status-line\">\n                  <span class=\"tag tag-success\">文档</span>\n                  <span class=\"tag\">递归分块</span>\n                </div>\n              </div>\n              <p class=\"knowledge-desc\">说明工单状态、工单数量、完工进度、异常工单等业务口径。</p>\n              <div class=\"knowledge-actions\">\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n\n            <article class=\"knowledge-card\" data-type=\"问答对\" data-title=\"工单状态如何统计\" data-desc=\"问题：按工单状态统计当前工单数量。答案：按待开工、生产中、已完工等状态汇总，并说明统计时间。\" data-question=\"按工单状态统计当前工单数量。\" data-answer=\"按待开工、生产中、已完工等状态汇总，并说明统计时间。\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 工单状态如何统计\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"knowledge-head\">\n                <h2 class=\"knowledge-title\">工单状态如何统计</h2>\n                <div class=\"knowledge-status-line\">\n                  <span class=\"tag tag-warn\">问答对</span>\n                </div>\n              </div>\n              <p class=\"knowledge-desc\">问题：按工单状态统计当前工单数量。答案：按待开工、生产中、已完工等状态汇总，并说明统计时间。</p>\n              <div class=\"knowledge-actions\">\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n\n            <article class=\"knowledge-card\" data-type=\"常见问题\" data-title=\"低于安全库存如何判断\" data-desc=\"问题：查询低于安全库存的物料。答案：按当前库存小于安全库存的物料范围返回，并提示库存更新时间。\" data-question=\"查询低于安全库存的物料。\" data-answer=\"按当前库存小于安全库存的物料范围返回，并提示库存更新时间。\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 低于安全库存如何判断\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"knowledge-head\">\n                <h2 class=\"knowledge-title\">低于安全库存如何判断</h2>\n                <div class=\"knowledge-status-line\">\n                  <span class=\"tag\">常见问题</span>\n                </div>\n              </div>\n              <p class=\"knowledge-desc\">问题：查询低于安全库存的物料。答案：按当前库存小于安全库存的物料范围返回，并提示库存更新时间。</p>\n              <div class=\"knowledge-actions\">\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n\n            <article class=\"knowledge-card\" data-type=\"文档\" data-title=\"设备停机分析口径\" data-desc=\"定义设备停机时长、停机原因分类、班组归属和统计周期。\" data-chunk=\"段落分块\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 设备停机分析口径\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"knowledge-head\">\n                <h2 class=\"knowledge-title\">设备停机分析口径</h2>\n                <div class=\"knowledge-status-line\">\n                  <span class=\"tag tag-success\">文档</span>\n                  <span class=\"tag\">段落分块</span>\n                </div>\n              </div>\n              <p class=\"knowledge-desc\">定义设备停机时长、停机原因分类、班组归属和统计周期。</p>\n              <div class=\"knowledge-actions\">\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n          </section>\n        </div>\n      </section>\n\n      <footer class=\"footer-actions\" aria-label=\"底部操作区\">\n        <button id=\"addKnowledgeButton\" class=\"btn btn-primary\" type=\"button\">添加知识</button>\n      </footer>\n    </section>\n  </main>\n\n  <div id=\"modalLayer\" class=\"modal-layer\" aria-hidden=\"true\">\n    <section class=\"modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"modalTitle\">\n      <header class=\"modal-head\">\n        <div class=\"modal-title\">\n          <h2 id=\"modalTitle\">编辑知识</h2>\n          <p id=\"modalDesc\">维护知识类型、标题、分块方式或问答内容。</p>\n        </div>\n        <button id=\"closeModal\" class=\"close-button\" type=\"button\" aria-label=\"关闭编辑弹窗\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M7 7l10 10M17 7L7 17\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"/>\n          </svg>\n        </button>\n      </header>\n\n      <div class=\"modal-body\">\n        <div class=\"field\">\n          <label>知识类型<span class=\"required\">*</span></label>\n          <select id=\"knowledgeType\" class=\"select\">\n            <option>文档（上传文件）</option>\n            <option>问答对</option>\n            <option>常见问题</option>\n          </select>\n        </div>\n\n        <div class=\"field\">\n          <label>知识标题<span class=\"required\">*</span></label>\n          <input id=\"knowledgeTitle\" class=\"input\" value=\"MOM 工单业务说明\">\n        </div>\n\n        <div id=\"chunkField\" class=\"field\">\n          <label>文档分块方式<span class=\"required\">*</span></label>\n          <select id=\"chunkType\" class=\"select\">\n            <option>递归分块</option>\n            <option>Token 分块</option>\n            <option>句子分块</option>\n            <option>段落分块</option>\n            <option>语义分块</option>\n          </select>\n        </div>\n\n        <div id=\"uploadField\" class=\"field full\">\n          <label>上传文件<span class=\"required\">*</span></label>\n          <button id=\"uploadBox\" class=\"upload-box\" type=\"button\">\n            <span>\n              <strong>点击选择文件</strong>\n              支持上传业务说明、操作手册、知识文档等文件\n            </span>\n          </button>\n          <input id=\"fileInput\" class=\"hidden-file\" type=\"file\">\n        </div>\n\n        <div id=\"questionField\" class=\"field full is-hidden\">\n          <label>问题<span class=\"required\">*</span></label>\n          <textarea id=\"questionInput\" class=\"textarea\">按工单状态统计当前工单数量。</textarea>\n        </div>\n\n        <div id=\"answerField\" class=\"field full is-hidden\">\n          <label>答案<span class=\"required\">*</span></label>\n          <textarea id=\"answerInput\" class=\"textarea\">按待开工、生产中、已完工等状态汇总，并说明统计时间。</textarea>\n        </div>\n      </div>\n\n      <footer class=\"modal-actions\">\n        <button id=\"cancelModal\" class=\"btn btn-secondary\" type=\"button\">取消</button>\n        <button id=\"saveModal\" class=\"btn btn-primary\" type=\"button\">保存</button>\n      </footer>\n    </section>\n  </div>\n\n  <script>\n    const appShell = document.getElementById('appShell');\n    const collapseButton = document.getElementById('collapseButton');\n    const searchInput = document.getElementById('searchInput');\n    const typeFilter = document.getElementById('typeFilter');\n    const selectionText = document.getElementById('selectionText');\n    const deleteSelected = document.getElementById('deleteSelected');\n    const modalLayer = document.getElementById('modalLayer');\n    const modalTitle = document.getElementById('modalTitle');\n    const knowledgeType = document.getElementById('knowledgeType');\n    const knowledgeTitle = document.getElementById('knowledgeTitle');\n    const chunkType = document.getElementById('chunkType');\n    const chunkField = document.getElementById('chunkField');\n    const uploadField = document.getElementById('uploadField');\n    const questionField = document.getElementById('questionField');\n    const answerField = document.getElementById('answerField');\n    const questionInput = document.getElementById('questionInput');\n    const answerInput = document.getElementById('answerInput');\n    const uploadBox = document.getElementById('uploadBox');\n    const fileInput = document.getElementById('fileInput');\n    const addKnowledgeButton = document.getElementById('addKnowledgeButton');\n    const closeModal = document.getElementById('closeModal');\n    const cancelModal = document.getElementById('cancelModal');\n    const saveModal = document.getElementById('saveModal');\n\n    let editingCard = null;\n\n    collapseButton.addEventListener('click', () => {\n      const collapsed = appShell.classList.toggle('is-collapsed');\n      collapseButton.setAttribute('aria-expanded', String(!collapsed));\n      collapseButton.setAttribute('aria-label', collapsed ? '展开侧边栏' : '收起侧边栏');\n      collapseButton.setAttribute('title', collapsed ? '展开侧边栏' : '收起侧边栏');\n    });\n\n    function selectedCards() {\n      return Array.from(document.querySelectorAll('.knowledge-card.is-selected'));\n    }\n\n    function syncSelection() {\n      const count = selectedCards().length;\n      selectionText.textContent = `已选择 ${count} 条知识`;\n      deleteSelected.disabled = count === 0;\n    }\n\n    function normalizeType(type) {\n      return type === '文档（上传文件）' ? '文档' : type;\n    }\n\n    function applyFilters() {\n      const keyword = searchInput.value.trim().toLowerCase();\n      const type = typeFilter.value;\n\n      document.querySelectorAll('.knowledge-card').forEach((card) => {\n        const title = (card.dataset.title || '').toLowerCase();\n        const matchKeyword = !keyword || title.includes(keyword);\n        const matchType = type === 'all' || card.dataset.type === type;\n        card.classList.toggle('is-hidden', !(matchKeyword && matchType));\n      });\n    }\n\n    function syncTypeFields() {\n      const type = knowledgeType.value;\n      const isDocument = type === '文档（上传文件）';\n      chunkField.classList.toggle('is-hidden', !isDocument);\n      uploadField.classList.toggle('is-hidden', !isDocument);\n      questionField.classList.toggle('is-hidden', isDocument);\n      answerField.classList.toggle('is-hidden', isDocument);\n    }\n\n    document.querySelectorAll('.card-select').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        button.closest('.knowledge-card').classList.toggle('is-selected');\n        syncSelection();\n      });\n    });\n\n    document.querySelectorAll('.knowledge-card').forEach((card) => {\n      card.addEventListener('click', (event) => {\n        if (event.target.closest('button')) return;\n        card.classList.toggle('is-selected');\n        syncSelection();\n      });\n    });\n\n    document.querySelectorAll('.delete-button').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        button.closest('.knowledge-card').remove();\n        syncSelection();\n      });\n    });\n\n    function openModal(card) {\n      editingCard = card;\n      const isNew = !card;\n      modalTitle.textContent = isNew ? '添加知识' : '编辑知识';\n\n      if (isNew) {\n        knowl is-collapsed .nav-item {\n        grid-template-columns: 28px minmax(0, 1fr);\n        place-items: initial;\n      }\n\n      .content { padding: 24px 20px; }\n      .page-head { display: grid; }\n\n      .toolbar {\n        align-items: flex-start;\n        flex-direction: column;\n      }\n\n      .toolbar-left,\n      .toolbar-right {\n        width: 100%;\n      }\n\n      .input,\n      .select {\n        width: 100%;\n      }\n\n      .knowledge-grid {\n        grid-template-columns: 1fr;\n      }\n\n      .footer-actions {\n        padding: 12px 16px;\n        justify-content: flex-end;\n        flex-wrap: wrap;\n        overflow-x: visible;\n      }\n\n      .footer-actions .btn { min-width: auto; }\n    }\n  </style>\n</head>\n<body>\n  <main id=\"appShell\" class=\"app-shell\" aria-label=\"KM-MOM DataAgent 业务知识配置页面\">\n    <aside class=\"sidebar\" aria-label=\"智能体配置导航\">\n      <div class=\"brand-row\">\n        <div class=\"brand-name\" aria-label=\"KM-MOM DataAgent\">\n          <span>KM-MOM</span>\n          <span>DataAgent</span>\n        </div>\n        <button id=\"collapseButton\" class=\"collapse-button\" type=\"button\" aria-label=\"收起侧边栏\" aria-expanded=\"true\" title=\"收起侧边栏\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M15 6l-6 6 6 6\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n          </svg>\n        </button>\n      </div>\n\n      <div class=\"primary-actions\">\n        <button class=\"btn btn-primary\" type=\"button\" title=\"前往运行页面\" aria-label=\"前往运行页面\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M5 12h13M12 5l7 7-7 7\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n          </svg>\n          <span class=\"btn-label\">前往运行页面</span>\n        </button>\n        <button class=\"btn btn-secondary\" type=\"button\" title=\"访问 API\" aria-label=\"访问 API\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M8 9l-3 3 3 3M16 9l3 3-3 3M14 5l-4 14\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n          </svg>\n          <span class=\"btn-label\">访问 API</span>\n        </button>\n      </div>\n\n      <section class=\"nav-block\" aria-label=\"配置导航\">\n        <div class=\"nav-title\">\n          <span>智能体配置</span>\n          <span>8 项</span>\n        </div>\n\n        <div class=\"nav-list\">\n          <button class=\"nav-item\" type=\"button\" title=\"模型配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 7h12M6 12h12M6 17h8\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">模型配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"数据源配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 7c0-1.7 3.1-3 7-3s7 1.3 7 3-3.1 3-7 3-7-1.3-7-3Z\" stroke=\"currentColor\" stroke-width=\"1.5\"/><path d=\"M5 7v5c0 1.7 3.1 3 7 3s7-1.3 7-3V7M5 12v5c0 1.7 3.1 3 7 3s7-1.3 7-3v-5\" stroke=\"currentColor\" stroke-width=\"1.5\"/></svg></span>\n            <span class=\"nav-label\">数据源配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"提示词配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 6h14M5 11h14M5 16h8\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/><path d=\"M16 16l2 2 3-4\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg></span>\n            <span class=\"nav-label\">提示词配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"Skill 管理\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M8 4h8v5H8V4ZM5 13h6v7H5v-7ZM13 13h6v7h-6v-7Z\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"/><path d=\"M12 9v2M8 13v-2h8v2\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">Skill 管理</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"智能体知识配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M7 5h8l2 2v12H7V5Z\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"/><path d=\"M10 10h4M10 14h5\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">智能体知识配置</span>\n          </button>\n\n          <button class=\"nav-item is-active\" type=\"button\" title=\"业务知识配置\" aria-current=\"page\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 8h16M6 8v11h12V8M9 8V5h6v3\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"/><path d=\"M9 13h6M9 16h4\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">业务知识配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"语义模型配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 8h12M8 13h8M10 18h4\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/><path d=\"M12 3v3M12 21v-3\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">语义模型配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"预设问题管理\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 7h12M6 12h8M6 17h10\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/><path d=\"M18 10l2 2-2 2\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg></span>\n            <span class=\"nav-label\">预设问题管理</span>\n          </button>\n        </div>\n      </section>\n\n      <div class=\"sidebar-footnote\">左侧导航切换右侧配置内容。</div>\n    </aside>\n\n    <section class=\"main\" aria-label=\"业务知识内容区域\">\n      <section class=\"content\">\n        <div class=\"content-inner\">\n          <header class=\"page-head\">\n            <div class=\"page-title\">\n              <h1>业务知识配置</h1>\n              <p>维护业务名词、描述和同义词，用于提升问数理解与口径匹配。</p>\n            </div>\n            <div class=\"save-state\">\n              <span class=\"status-dot\" aria-hidden=\"true\"></span>\n              <span>向量状态正常</span>\n            </div>\n          </header>\n\n          <section class=\"toolbar\" aria-label=\"业务知识筛选与批量操作\">\n            <div class=\"toolbar-left\">\n              <input id=\"searchInput\" class=\"input\" type=\"text\" placeholder=\"搜索业务名词\">\n              <select id=\"vectorFilter\" class=\"select\" aria-label=\"向量状态筛选\">\n                <option value=\"all\">全部状态</option>\n                <option value=\"normal\">向量正常</option>\n                <option value=\"pending\">待同步</option>\n              </select>\n            </div>\n            <div class=\"toolbar-right\">\n              <span id=\"selectionText\" class=\"selection-text\">已选择 0 条业务知识</span>\n              <button id=\"deleteSelected\" class=\"btn btn-danger\" type=\"button\" disabled>删除所选</button>\n            </div>\n          </section>\n\n          <section class=\"knowledge-grid\" aria-label=\"业务知识卡片列表\">\n            <article class=\"knowledge-card\" data-title=\"工单\" data-desc=\"生产执行过程中的任务单元，用于承载产品、数量、工序、计划时间和执行状态。\" data-synonyms=\"生产工单, 制造工单, 任务单\" data-vector=\"normal\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 工单\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"knowledge-head\">\n                <h2 class=\"knowledge-title\">工单</h2>\n                <div class=\"knowledge-status-line\">\n                  <span class=\"tag tag-success vector-tag\">向量正常</span>\n                  <span class=\"tag\">业务名词</span>\n                </div>\n              </div>\n              <div>\n                <p class=\"knowledge-desc\">生产执行过程中的任务单元，用于承载产品、数量、工序、计划时间和执行状态。</p>\n                <div class=\"synonyms\">同义词：生产工单、制造工单、任务单</div>\n              </div>\n              <div class=\"knowledge-actions\">\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n\n            <article class=\"knowledge-card\" data-title=\"安全库存\" data-desc=\"为避免缺料或供应波动而设置的最低库存阈值。\" data-synonyms=\"最低库存, 库存下限, 安全水位\" data-vector=\"normal\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 安全库存\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"knowledge-head\">\n                <h2 class=\"knowledge-title\">安全库存</h2>\n                <div class=\"knowledge-status-line\">\n                  <span class=\"tag tag-success vector-tag\">向量正常</span>\n                  <span class=\"tag\">业务名词</span>\n                </div>\n              </div>\n              <div>\n                <p class=\"knowledge-desc\">为避免缺料或供应波动而设置的最低库存阈值。</p>\n                <div class=\"synonyms\">同义词：最低库存、库存下限、安全水位</div>\n              </div>\n              <div class=\"knowledge-actions\">\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n\n            <article class=\"knowledge-card\" data-title=\"设备停机\" data-desc=\"设备因故障、保养、换型或等待物料等原因导致无法生产的时间段。\" data-synonyms=\"停机时长, 设备异常, 停线\" data-vector=\"pending\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 设备停机\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"knowledge-head\">\n                <h2 class=\"knowledge-title\">设备停机</h2>\n                <div class=\"knowledge-status-line\">\n                  <span class=\"tag tag-warn vector-tag\">待同步</span>\n                  <span class=\"tag\">业务名词</span>\n                </div>\n              </div>\n              <div>\n                <p class=\"knowledge-desc\">设备因故障、保养、换型或等待物料等原因导致无法生产的时间段。</p>\n                <div class=\"synonyms\">同义词：停机时长、设备异常、停线</div>\n              </div>\n              <div class=\"knowledge-actions\">\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n\n            <article class=\"knowledge-card\" data-title=\"生产达成率\" data-desc=\"实际完成数量与计划数量之间的比例，用于衡量生产计划执行情况。\" data-synonyms=\"达成率, 完成率, 计划完成率\" data-vector=\"normal\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 生产达成率\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"knowledge-head\">\n                <h2 class=\"knowledge-title\">生产达成率</h2>\n                <div class=\"knowledge-status-line\">\n                  <span class=\"tag tag-success vector-tag\">向量正常</span>\n                  <span class=\"tag\">业务名词</span>\n                </div>\n              </div>\n              <div>\n                <p class=\"knowledge-desc\">实际完成数量与计划数量之间的比例，用于衡量生产计划执行情况。</p>\n                <div class=\"synonyms\">同义词：达成率、完成率、计划完成率</div>\n              </div>\n              <div class=\"knowledge-actions\">\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n          </section>\n        </div>\n      </section>\n\n      <footer class=\"footer-actions\" aria-label=\"底部操作区\">\n        <button id=\"syncVectorButton\" class=\"btn btn-secondary\" type=\"button\">同步到向量数据库</button>\n        <button id=\"addKnowledgeButton\" class=\"btn btn-primary\" type=\"button\">添加知识</button>\n      </footer>\n    </section>\n  </main>\n\n  <div id=\"editModalLayer\" class=\"modal-layer\" aria-hidden=\"true\">\n    <section class=\"modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"editModalTitle\">\n      <header class=\"modal-head\">\n        <div class=\"modal-title\">\n          <h2 id=\"editModalTitle\">编辑业务知识</h2>\n          <p>维护业务名词、描述和同义词。</p>\n        </div>\n        <button id=\"closeEditModal\" class=\"close-button\" type=\"button\" aria-label=\"关闭编辑弹窗\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M7 7l10 10M17 7L7 17\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"/>\n          </svg>\n        </button>\n      </header>\n\n      <div class=\"modal-body\">\n        <div class=\"field\">\n          <label>业务名词<span class=\"required\">*</span></label>\n          <input id=\"termInput\" class=\"input\" value=\"工单\">\n        </div>\n        <div class=\"field\">\n          <label>描述<span class=\"required\">*</span></label>\n          <textarea id=\"descInput\" class=\"textarea\">生产执行过程中的任务单元，用于承载产品、数量、工序、计划时间和执行状态。</textarea>\n        </div>\n        <div class=\"field\">\n          <label>同义词</label>\n          <input id=\"synonymsInput\" class=\"input\" value=\"生产工单, 制造工单, 任务单\">\n        </div>\n      </div>\n\n      <footer class=\"modal-actions\">\n        <button id=\"cancelEditModal\" class=\"btn btn-secondary\" type=\"button\">取消</button>\n        <button id=\"saveEditModal\" class=\"btn btn-primary\" type=\"button\">保存</button>\n      </footer>\n    </section>\n  </div>\n\n  <div id=\"syncModalLayer\" class=\"modal-layer\" aria-hidden=\"true\">\n    <section class=\"modal confirm-modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"syncModalTitle\">\n      <header class=\"modal-head\">\n        <div class=\"modal-title\">\n          <h2 id=\"syncModalTitle\">确认同步到向量数据库</h2>\n          <p>同步前请确认当前业务知识内容已经保存。</p>\n        </div>\n        <button id=\"closeSyncModal\" class=\"close-button\" type=\"button\" aria-label=\"关闭同步确认弹窗\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M7 7l10 10M17 7L7 17\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"/>\n          </svg>\n        </button>\n      </header>\n\n      <div class=\"modal-body\">\n        <p class=\"confirm-copy\">如果所有向量状态正常，即无需同步。确定要清除现有数据并开始重新同步吗？</p>\n      </div>\n\n      <footer class=\"modal-actions\">\n        <button id=\"cancelSyncModal\" class=\"btn btn-secondary\" type=\"button\">取消</button>\n        <button id=\"confirmSyncButton\" class=\"btn btn-primary\" type=\"button\">确认同步</button>\n      </footer>\n    </section>\n  </div>\n\n  <script>\n    const appShell = document.getElementById('appShell');\n    const collapseButton = document.getElementById('collapseButton');\n    const searchInput = document.getElementById('searchInput');\n    const vectorFilter = document.getElementById('vectorFilter');\n    const selectionText = document.getElementById('selectionText');\n    const deleteSelected = document.getElementById('deleteSelected');\n    const editModalLayer = document.getElementById('editModalLayer');\n    const syncModalLayer = document.getElementById('syncModalLayer');\n    const editModalTitle = document.getElementById('editModalTitle');\n    const termInput = document.getElementById('termInput');\n    const descInput = document.getElementById('descInput');\n    const synonymsInput = document.getElementById('synonymsInput');\n    const addKnowledgeButton = document.getElementById('addKnowledgeButton');\n    const syncVectorButton = document.getElementById('syncVectorButton');\n    const closeEditModal = document.getElementById('closeEditModal');\n    const cancelEditModal = document.getElementById('cancelEditModal');\n    const saveEditModal = document.getElementById('saveEditModal');\n    const closeSyncModal = document.getElementById('closeSyncModal');\n    const cancelSyncModal = document.getElementById('cancelSyncModal');\n    const confirmSyncButton = document.getElementById('confirmSyncButton');\n\n    let editingCard = null;\n\n    collapseButton.addEventListener('click', () => {\n      const collapsed = appShell.classList.toggle('is-collapsed');\n      collapseButton.setAttribute('aria-expanded', String(!collapsed));\n      collapseButton.setAttribute('aria-label', collapsed ? '展开侧边栏' : '收起侧边栏');\n      collapseButton.setAttribute('title', collapsed ? '展开侧边栏' : '收起侧边栏');\n    });\n\n    function selectedCards() {\n      return Array.from(document.querySelectorAll('.knowledge-card.is-selected'));\n    }\n\n    function syncSelection() {\n      const count = selectedCards().length;\n      selectionText.textContent = `已选择 ${count} 条业务知识`;\n      deleteSelected.disabled = count === 0;\n    }\n\n    function applyFilters() {\n      const keyword = searchInput.value.trim().toLowerCase();\n      const vector = vectorFilter.value;\n\n      document.querySelectorAll('.knowledge-card').forEach((card) => {\n        const title = (card.dataset.title || '').toLowerCase();\n        const matchKeyword = !keyword || title.includes(keyword);\n        const matchVector = vector === 'all' || card.dataset.vector === vector;\n        card.classList.toggle('is-hidden', !(matchKeyword && matchVector));\n      });\n    }\n\n    function openEditModal(card) {\n      editingCard = card;\n      const isNew = !card;\n      editModalTitle.textContent = isNew ? '添加业务知识' : '编辑业务知识';\n      termInput.value = isNew ? '新业务名词' : card.dataset.title;\n      descInput.value = isNew ? '请输入业务名词描述。' : card.dataset.desc;\n      synonymsInput.value = isNew ? '' : card.dataset.synonyms;\n      editModalLayer.classList.add('is-open');\n      editModalLayer.setAttribute('aria-hidden', 'false');\n    }\n\n    function hideEditModal() {\n      editModalLayer.classList.remove('is-open');\n      editModalLayer.setAttribute('aria-hidden', 'true');\n    }\n\n    function openSyncModal() {\n      syncModalLayer.classList.add('is-open');\n      syncModalLayer.setAttribute('aria-hidden', 'false');\n    }\n\n    function hideSyncModal() {\n      syncModalLayer.classList.remove('is-open');\n      syncModalLayer.setAttribute('aria-hidden', 'true');\n    }\n\n    document.querySelectorAll('.card-select').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        button.closest('.knowledge-card').classList.toggle('is-selected');\n        syncSelection();\n      });\n    });\n\n    document.querySelectorAll('.knowledge-card').forEach((card) => {\n      card.addEventListener('click', (event) => {\n        if (event.target.c
