n    }\n\n    .semantic-card.is-selected .card-select {\n      border-color: var(--accent);\n      background: var(--accent);\n    }\n\n    .card-select svg {\n      width: 15px;\n      height: 15px;\n    }\n\n    .semantic-head {\n      padding-right: 30px;\n      display: grid;\n      gap: 8px;\n    }\n\n    .semantic-title {\n      margin: 0;\n      color: var(--fg);\n      font-size: 18px;\n      line-height: 1.2;\n      font-weight: 600;\n      letter-spacing: -0.01em;\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n\n    .semantic-status-line {\n      display: flex;\n      gap: 8px;\n      flex-wrap: wrap;\n      align-items: center;\n    }\n\n    .tag {\n      display: inline-flex;\n      align-items: center;\n      gap: 5px;\n      min-height: 24px;\n      border-radius: 999px;\n      border: 1px solid var(--border);\n      padding: 2px 8px;\n      background: #FFFFFF;\n      color: var(--muted);\n      font-size: 12px;\n      white-space: nowrap;\n    }\n\n    .tag-success {\n      color: var(--success);\n      border-color: color-mix(in srgb, var(--success) 30%, var(--border));\n      background: color-mix(in srgb, var(--success) 7%, white);\n    }\n\n    .tag-warn {\n      color: var(--warn);\n      border-color: color-mix(in srgb, var(--warn) 34%, var(--border));\n      background: color-mix(in srgb, var(--warn) 9%, white);\n    }\n\n    .semantic-desc {\n      margin: 0;\n      color: color-mix(in srgb, var(--fg) 76%, var(--muted));\n      font-size: 13px;\n      line-height: 1.6;\n      display: -webkit-box;\n      -webkit-line-clamp: 4;\n      -webkit-box-orient: vertical;\n      overflow: hidden;\n    }\n\n    .semantic-actions {\n      display: flex;\n      align-items: center;\n      justify-content: flex-end;\n      gap: 8px;\n      flex-wrap: wrap;\n    }\n\n    .semantic-actions .btn {\n      min-height: 34px;\n      padding: 7px 11px;\n      font-size: 12px;\n    }\n\n    .footer-actions {\n      border-top: 1px solid var(--border);\n      background: color-mix(in srgb, var(--surface) 94%, var(--bg));\n      padding: 14px 32px;\n      display: flex;\n      justify-content: flex-end;\n      align-items: center;\n      gap: 10px;\n      min-width: 0;\n      overflow-x: auto;\n    }\n\n    .footer-actions .btn {\n      flex: 0 0 auto;\n      min-width: 118px;\n    }\n\n    .modal-layer {\n      position: fixed;\n      inset: 0;\n      display: none;\n      place-items: center;\n      padding: 32px;\n      background: rgba(17, 17, 17, 0.28);\n      z-index: 30;\n    }\n\n    .modal-layer.is-open { display: grid; }\n\n    .modal {\n      width: min(760px, 100%);\n      max-height: min(820px, calc(100vh - 64px));\n      background: var(--surface);\n      border: 1px solid var(--border);\n      border-radius: 12px;\n      box-shadow: var(--modal-shadow);\n      overflow: hidden;\n      display: grid;\n      grid-template-rows: auto minmax(0, 1fr) auto;\n    }\n\n    .import-modal {\n      width: min(860px, 100%);\n    }\n\n    .modal-head {\n      padding: 18px 20px;\n      border-bottom: 1px solid var(--border);\n      display: flex;\n      align-items: flex-start;\n      justify-content: space-between;\n      gap: 16px;\n    }\n\n    .modal-title {\n      display: grid;\n      gap: 4px;\n    }\n\n    .modal-title h2 {\n      margin: 0;\n      font-size: 18px;\n      line-height: 1.2;\n      font-weight: 600;\n    }\n\n    .modal-title p {\n      margin: 0;\n      color: var(--muted);\n      font-size: 13px;\n    }\n\n    .close-button {\n      width: 34px;\n      height: 34px;\n      border: 1px solid var(--border);\n      border-radius: 8px;\n      background: var(--surface);\n      color: var(--muted);\n      display: grid;\n      place-items: center;\n      padding: 0;\n    }\n\n    .modal-body {\n      overflow: auto;\n      padding: 18px 20px;\n      display: grid;\n      gap: 12px;\n    }\n\n    .form-grid {\n      display: grid;\n      grid-template-columns: repeat(2, minmax(0, 1fr));\n      gap: 12px;\n    }\n\n    .field {\n      display: grid;\n      gap: 6px;\n    }\n\n    .field.full { grid-column: 1 / -1; }\n\n    .field label {\n      color: var(--fg);\n      font-size: 12px;\n      font-weight: 600;\n    }\n\n    .required {\n      color: var(--danger);\n      margin-left: 2px;\n    }\n\n    .modal-body .input,\n    .modal-body .select {\n      width: 100%;\n    }\n\n    .import-tabs {\n      display: inline-flex;\n      width: fit-content;\n      border: 1px solid var(--border);\n      border-radius: 8px;\n      overflow: hidden;\n      background: #FFFFFF;\n    }\n\n    .tab-button {\n      min-height: 34px;\n      border: 0;\n      padding: 7px 14px;\n      background: transparent;\n      color: var(--muted);\n      font-weight: 600;\n    }\n\n    .tab-button.is-active {\n      background: var(--sidebar-strong);\n      color: var(--accent);\n    }\n\n    .import-panel {\n      display: grid;\n      gap: 12px;\n    }\n\n    .import-panel.is-hidden { display: none; }\n\n    .import-note {\n      border: 1px solid var(--border);\n      border-radius: 10px;\n      background: #FAFAFA;\n      padding: 12px 14px;\n      color: var(--muted);\n      font-size: 13px;\n      line-height: 1.7;\n    }\n\n    .import-note ol {\n      margin: 0;\n      padding-left: 18px;\n    }\n\n    .upload-box {\n      min-height: 148px;\n      border: 1px dashed color-mix(in srgb, var(--accent) 36%, var(--border));\n      border-radius: 10px;\n      background: color-mix(in srgb, var(--accent) 5%, white);\n      display: grid;\n      place-items: center;\n      padding: 16px;\n      text-align: center;\n      color: var(--muted);\n    }\n\n    .upload-box strong {\n      color: var(--fg);\n      display: block;\n      margin-bottom: 4px;\n    }\n\n    .validation-line {\n      min-height: 28px;\n      color: var(--muted);\n      font-size: 13px;\n    }\n\n    .validation-line.success { color: var(--success); }\n    .validation-line.error { color: var(--danger); }\n\n    .modal-actions {\n      border-top: 1px solid var(--border);\n      padding: 14px 20px;\n      display: flex;\n      justify-content: space-between;\n      gap: 8px;\n      background: #FFFFFF;\n    }\n\n    .modal-actions-left,\n    .modal-actions-right {\n      display: flex;\n      gap: 8px;\n      flex-wrap: wrap;\n    }\n\n    .hidden-file { display: none; }\n\n    @media (max-width: 1180px) {\n      body { overflow: auto; }\n      .app-shell { height: auto; }\n      .sidebar,\n      .main { height: auto; }\n\n      .semantic-grid {\n        grid-template-columns: repeat(2, minmax(0, 1fr));\n      }\n    }\n\n    @media (max-width: 900px) {\n      .app-shell,\n      .app-shell.is-collapsed {\n        min-height: 100dvh;\n        height: auto;\n        grid-template-columns: 1fr;\n      }\n\n      .sidebar {\n        min-height: auto;\n        border-right: 0;\n        border-bottom: 1px solid var(--border);\n        align-items: stretch;\n      }\n\n      .app-shell.is-collapsed .brand-row {\n        grid-template-columns: minmax(0, 1fr) 34px;\n        justify-items: stretch;\n      }\n\n      .app-shell.is-collapsed .brand-name,\n      .app-shell.is-collapsed .btn-label,\n      .app-shell.is-collapsed .nav-title,\n      .app-shell.is-collapsed .nav-label,\n      .app-shell.is-collapsed .sidebar-footnote {\n        display: initial;\n      }\n\n      .app-shell.is-collapsed .btn,\n      .app-shell.is-collapsed .nav-item {\n        width: auto;\n        height: auto;\n        min-height: 42px;\n        padding: 10px 14px;\n        margin: 0;\n      }\n\n      .app-shell.is-collapsed .nav-item {\n        grid-template-columns: 28px minmax(0, 1fr);\n        place-items: initial;\n      }\n\n      .content { padding: 24px 20px; }\n      .page-head { display: grid; }\n\n      .toolbar {\n        align-items: flex-start;\n        flex-direction: column;\n      }\n\n      .toolbar-left,\n      .toolbar-right {\n        width: 100%;\n      }\n\n      .input,\n      .select {\n        width: 100%;\n      }\n\n      .semantic-grid {\n        grid-template-columns: 1fr;\n      }\n\n      .footer-actions {\n        padding: 12px 16px;\n        justify-content: flex-end;\n        flex-wrap: wrap;\n        overflow-x: visible;\n      }\n\n      .footer-actions .btn { min-width: auto; }\n\n      .form-grid {\n        grid-template-columns: 1fr;\n      }\n\n      .modal-actions {\n        display: grid;\n      }\n\n      .modal-actions-left,\n      .modal-actions-right {\n        justify-content: flex-end;\n      }\n    }\n  </style>\n</head>\n<body>\n  <main id=\"appShell\" class=\"app-shell\" aria-label=\"KM-MOM DataAgent 语义模型配置页面\">\n    <aside class=\"sidebar\" aria-label=\"智能体配置导航\">\n      <div class=\"brand-row\">\n        <div class=\"brand-name\" aria-label=\"KM-MOM DataAgent\">\n          <span>KM-MOM</span>\n          <span>DataAgent</span>\n        </div>\n        <button id=\"collapseButton\" class=\"collapse-button\" type=\"button\" aria-label=\"收起侧边栏\" aria-expanded=\"true\" title=\"收起侧边栏\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M15 6l-6 6 6 6\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n          </svg>\n        </button>\n      </div>\n\n      <div class=\"primary-actions\">\n        <button class=\"btn btn-primary\" type=\"button\" title=\"前往运行页面\" aria-label=\"前往运行页面\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M5 12h13M12 5l7 7-7 7\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n          </svg>\n          <span class=\"btn-label\">前往运行页面</span>\n        </button>\n        <button class=\"btn btn-secondary\" type=\"button\" title=\"访问 API\" aria-label=\"访问 API\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M8 9l-3 3 3 3M16 9l3 3-3 3M14 5l-4 14\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>\n          </svg>\n          <span class=\"btn-label\">访问 API</span>\n        </button>\n      </div>\n\n      <section class=\"nav-block\" aria-label=\"配置导航\">\n        <div class=\"nav-title\">\n          <span>智能体配置</span>\n          <span>8 项</span>\n        </div>\n\n        <div class=\"nav-list\">\n          <button class=\"nav-item\" type=\"button\" title=\"模型配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 7h12M6 12h12M6 17h8\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">模型配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"数据源配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 7c0-1.7 3.1-3 7-3s7 1.3 7 3-3.1 3-7 3-7-1.3-7-3Z\" stroke=\"currentColor\" stroke-width=\"1.5\"/><path d=\"M5 7v5c0 1.7 3.1 3 7 3s7-1.3 7-3V7M5 12v5c0 1.7 3.1 3 7 3s7-1.3 7-3v-5\" stroke=\"currentColor\" stroke-width=\"1.5\"/></svg></span>\n            <span class=\"nav-label\">数据源配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"提示词配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 6h14M5 11h14M5 16h8\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/><path d=\"M16 16l2 2 3-4\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg></span>\n            <span class=\"nav-label\">提示词配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"Skill 管理\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M8 4h8v5H8V4ZM5 13h6v7H5v-7ZM13 13h6v7h-6v-7Z\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"/><path d=\"M12 9v2M8 13v-2h8v2\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">Skill 管理</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"智能体知识配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M7 5h8l2 2v12H7V5Z\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"/><path d=\"M10 10h4M10 14h5\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">智能体知识配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"业务知识配置\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 8h16M6 8v11h12V8M9 8V5h6v3\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\"/><path d=\"M9 13h6M9 16h4\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">业务知识配置</span>\n          </button>\n\n          <button class=\"nav-item is-active\" type=\"button\" title=\"语义模型配置\" aria-current=\"page\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 8h12M8 13h8M10 18h4\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/><path d=\"M12 3v3M12 21v-3\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/></svg></span>\n            <span class=\"nav-label\">语义模型配置</span>\n          </button>\n\n          <button class=\"nav-item\" type=\"button\" title=\"预设问题管理\">\n            <span class=\"nav-icon\" aria-hidden=\"true\"><svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M6 7h12M6 12h8M6 17h10\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/><path d=\"M18 10l2 2-2 2\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg></span>\n            <span class=\"nav-label\">预设问题管理</span>\n          </button>\n        </div>\n      </section>\n\n      <div class=\"sidebar-footnote\">左侧导航切换右侧配置内容。</div>\n    </aside>\n\n    <section class=\"main\" aria-label=\"语义模型配置内容区域\">\n      <section class=\"content\">\n        <div class=\"content-inner\">\n          <header class=\"page-head\">\n            <div class=\"page-title\">\n              <h1>语义模型配置</h1>\n              <p>维护数据库字段与业务语义的映射关系，用于提升自然语言问数理解效果。</p>\n            </div>\n            <div class=\"save-state\">\n              <span class=\"status-dot\" aria-hidden=\"true\"></span>\n              <span>已维护 6 条字段语义</span>\n            </div>\n          </header>\n\n          <section class=\"toolbar\" aria-label=\"语义模型筛选与批量操作\">\n            <div class=\"toolbar-left\">\n              <input id=\"searchInput\" class=\"input\" type=\"text\" placeholder=\"搜索表名、字段名或业务名称\">\n              <select id=\"typeFilter\" class=\"select\" aria-label=\"数据类型筛选\">\n                <option value=\"all\">全部类型</option>\n                <option value=\"int\">int</option>\n                <option value=\"varchar\">varchar</option>\n                <option value=\"datetime\">datetime</option>\n                <option value=\"decimal\">decimal</option>\n              </select>\n            </div>\n            <div class=\"toolbar-right\">\n              <span id=\"selectionText\" class=\"selection-text\">已选择 0 条语义模型</span>\n              <button id=\"deleteSelected\" class=\"btn btn-danger\" type=\"button\" disabled>删除所选</button>\n            </div>\n          </section>\n\n          <section class=\"semantic-grid\" aria-label=\"语义模型卡片列表\">\n            <article class=\"semantic-card\" data-table=\"work_order\" data-column=\"order_type\" data-business=\"工单类型\" data-synonyms=\"类型,工单种类\" data-desc=\"用于区分工单种类。枚举值：1=资产工单, 2=账号工单\" data-comment=\"工单类型编码\" data-type=\"int\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 工单类型\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"semantic-head\">\n                <h2 class=\"semantic-title\">工单类型</h2>\n                <div class=\"semantic-status-line\">\n                  <span class=\"tag tag-success\">work_order.order_type</span>\n                  <span class=\"tag\">int</span>\n                </div>\n              </div>\n              <p class=\"semantic-desc\">用于区分工单种类。枚举值：1=资产工单, 2=账号工单</p>\n              <div class=\"semantic-actions\">\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n\n            <article class=\"semantic-card\" data-table=\"work_order\" data-column=\"status\" data-business=\"工单状态\" data-synonyms=\"状态,处理状态\" data-desc=\"工单当前处理状态。枚举值：0=待处理 1=处理中 2=已完成 3=已关闭\" data-comment=\"当前处理状态\" data-type=\"int\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 工单状态\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"semantic-head\">\n                <h2 class=\"semantic-title\">工单状态</h2>\n                <div class=\"semantic-status-line\">\n                  <span class=\"tag tag-success\">work_order.status</span>\n                  <span class=\"tag\">int</span>\n                </div>\n              </div>\n              <p class=\"semantic-desc\">工单当前处理状态。枚举值：0=待处理 1=处理中 2=已完成 3=已关闭</p>\n              <div class=\"semantic-actions\">\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n\n            <article class=\"semantic-card\" data-table=\"material_stock\" data-column=\"safe_qty\" data-business=\"安全库存\" data-synonyms=\"库存下限,最低库存\" data-desc=\"物料库存低于该值时需要提示缺料风险。\" data-comment=\"安全库存数量\" data-type=\"decimal\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 安全库存\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"semantic-head\">\n                <h2 class=\"semantic-title\">安全库存</h2>\n                <div class=\"semantic-status-line\">\n                  <span class=\"tag tag-success\">material_stock.safe_qty</span>\n                  <span class=\"tag\">decimal</span>\n                </div>\n              </div>\n              <p class=\"semantic-desc\">物料库存低于该值时需要提示缺料风险。</p>\n              <div class=\"semantic-actions\">\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n\n            <article class=\"semantic-card\" data-table=\"equipment_downtime\" data-column=\"stop_minutes\" data-business=\"停机时长\" data-synonyms=\"停机分钟,设备停机时间\" data-desc=\"设备本次停机持续时间，单位为分钟。\" data-comment=\"停机分钟数\" data-type=\"int\">\n              <button class=\"card-select\" type=\"button\" aria-label=\"选择 停机时长\">\n                <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M6 12.5l4 4L18 8\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>\n              </button>\n              <div class=\"semantic-head\">\n                <h2 class=\"semantic-title\">停机时长</h2>\n                <div class=\"semantic-status-line\">\n                  <span class=\"tag tag-success\">equipment_downtime.stop_minutes</span>\n                  <span class=\"tag\">int</span>\n                </div>\n              </div>\n              <p class=\"semantic-desc\">设备本次停机持续时间，单位为分钟。</p>\n              <div class=\"semantic-actions\">\n                <button class=\"btn btn-secondary edit-button\" type=\"button\">编辑</button>\n                <button class=\"btn btn-danger delete-button\" type=\"button\">删除</button>\n              </div>\n            </article>\n          </section>\n        </div>\n      </section>\n\n      <footer class=\"footer-actions\" aria-label=\"底部操作区\">\n        <button id=\"batchImportButton\" class=\"btn btn-secondary\" type=\"button\">批量导入</button>\n        <button id=\"addSemanticButton\" class=\"btn btn-primary\" type=\"button\">添加语义模型</button>\n      </footer>\n    </section>\n  </main>\n\n  <div id=\"editModalLayer\" class=\"modal-layer\" aria-hidden=\"true\">\n    <section class=\"modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"editModalTitle\">\n      <header class=\"modal-head\">\n        <div class=\"modal-title\">\n          <h2 id=\"editModalTitle\">编辑语义模型</h2>\n          <p>维护字段与业务语义的映射关系。</p>\n        </div>\n        <button id=\"closeEditModal\" class=\"close-button\" type=\"button\" aria-label=\"关闭编辑弹窗\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M7 7l10 10M17 7L7 17\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"/>\n          </svg>\n        </button>\n      </header>\n\n      <div class=\"modal-body\">\n        <div class=\"form-grid\">\n          <div class=\"field\">\n            <label>表名<span class=\"required\">*</span></label>\n            <input id=\"tableInput\" class=\"input\" value=\"work_order\">\n          </div>\n          <div class=\"field\">\n            <label>数据库字段名<span class=\"required\">*</span></label>\n            <input id=\"columnInput\" class=\"input\" value=\"order_type\">\n          </div>\n          <div class=\"field\">\n            <label>业务名称<span class=\"required\">*</span></label>\n            <input id=\"businessInput\" class=\"input\" value=\"工单类型\">\n          </div>\n          <div class=\"field\">\n            <label>数据类型<span class=\"required\">*</span></label>\n            <input id=\"dataTypeInput\" class=\"input\" value=\"int\">\n          </div>\n          <div class=\"field full\">\n            <label>同义词</label>\n            <input id=\"synonymsInput\" class=\"input\" value=\"类型,工单种类\">\n          </div>\n          <div class=\"field full\">\n            <label>业务描述</label>\n            <textarea id=\"businessDescInput\" class=\"textarea\">用于区分工单种类。枚举值：1=资产工单, 2=账号工单</textarea>\n          </div>\n          <div class=\"field full\">\n            <label>字段注释</label>\n            <textarea id=\"commentInput\" class=\"textarea\">工单类型编码</textarea>\n          </div>\n        </div>\n      </div>\n\n      <footer class=\"modal-actions\">\n        <div class=\"modal-actions-left\"></div>\n        <div class=\"modal-actions-right\">\n          <button id=\"cancelEditModal\" class=\"btn btn-secondary\" type=\"button\">取消</button>\n          <button id=\"saveEditModal\" class=\"btn btn-primary\" type=\"button\">保存</button>\n        </div>\n      </footer>\n    </section>\n  </div>\n\n  <div id=\"importModalLayer\" class=\"modal-layer\" aria-hidden=\"true\">\n    <section class=\"modal import-modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"importModalTitle\">\n      <header class=\"modal-head\">\n        <div class=\"modal-title\">\n          <h2 id=\"importModalTitle\">批量导入语义模型</h2>\n          <p>支持通过 JSON 或 Excel 批量导入字段语义配置。</p>\n        </div>\n        <button id=\"closeImportModal\" class=\"close-button\" type=\"button\" aria-label=\"关闭导入弹窗\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n            <path d=\"M7 7l10 10M17 7L7 17\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"/>\n          </svg>\n        </button>\n      </header>\n\n      <div class=\"modal-body\">\n        <div class=\"import-tabs\" role=\"tablist\" aria-label=\"导入方式\">\n          <button id=\"jsonTab\" class=\"tab-button is-active\" type=\"button\">JSON 导入</button>\n          <button id=\"excelTab\" class=\"tab-button\" type=\"button\">Excel 导入</button>\n        </div>\n\n        <div class=\"import-note\">\n          <ol>\n            <li>支持JSON和Excel两种导入方式</li>\n            <li>如果记录已存在（相同表名+字段名），将自动覆盖更新</li>\n            <li>枚举字段信息可以直接写在“业务描述”中，例如：枚举值：1=资产工单, 2=账号工单</li>\n            <li>必填字段：表名、字段名、业务名称、数据类型</li>\n          </ol>\n        </div>\n\n        <section id=\"jsonPanel\" class=\"import-panel\">\n          <textarea id=\"jsonInput\" class=\"textarea json-area\" spellcheck=\"false\">[\n  {\n    \"tableName\": \"work_order\",\n    \"columnName\": \"order_type\",\n    \"businessName\": \"工单类型\",\n    \"synonyms\": \"类型,工单种类\",\n    \"businessDesc\": \"用于区分工单种类。枚举值：1=资产工单, 2=账号工单\",\n    \"dataType\": \"int\"\n  },\n  {\n    \"tableName\": \"work_order\",\n    \"columnName\": \"status\",\n    \"businessName\": \"工单状态\",\n    \"synonyms\": \"状态,处理状态\",\n    \"businessDesc\": \"工单当前处理状态。枚举值：0=待处理 1=处理中 2=已完成 3=已关闭\",\n    \"dataType\": \"int\"\n  }\n]</textarea>\n          <div id=\"validationLine\" class=\"validation-line\">尚未验证 JSON。</div>\n        </section>\n\n        <section id=\"excelPanel\" class=\"import-panel is-hidden\">\n          <button id=\"excelUploadBox\" class=\"upload-box\" type=\"button\">\n            <span>\n              <strong>点击上传 Excel 文件</strong>\n              表头需包含 tableName、columnName、businessName、synonyms、businessDesc、dataType\n            </span>\n          </button>\n          <input id=\"excelInput\" class=\"hidden-file\" type=\"file\" accept=\".xlsx,.xls\">\n        </section>\n      </div>\n\n      <footer class=\"modal-actions\">\n        <div class=\"modal-actions-left\">\n          <button id=\"loadTemplateButton\" class=\"btn btn-secondary\" type=\"button\">加载模板</button>\n          <button id=\"validateJsonButton\" class=\"btn btn-soft\" type=\"button\">验证 JSON</button>\n        </div>\n        <div class=\"modal-actions-right\">\n          <button id=\"cancelImportModal\" class=\"btn btn-secondary\" type=\"button\">关闭</button>\n          <button id=\"startImportButton\" class=\"btn btn-primary\" type=\"button\">开始导入</button>\n        </div>\n      </footer>\n    </section>\n  </div>\n\n  <script>\n    const appShell = document.getElementById('appShell');\n    const collapseButton = document.getElementById('collapseButton');\n    const searchInput = document.getElementById('searchInput');\n    const typeFilter = document.getElementById('typeFilter');\n    const selectionText = document.getElementById('selectionText');\n    const deleteSelected = document.getElementById('deleteSelected');\n\n    const editModalLayer = document.getElementById('editModalLayer');\n    const editModalTitle = document.getElementById('editModalTitle');\n    const closeEditModal = document.getElementById('closeEditModal');\n    const cancelEditModal = document.getElementById('cancelEditModal');\n    const saveEditModal = document.getElementById('saveEditModal');\n\n    const tableInput = document.getElementById('tableInput');\n    const columnInput = document.getElementById('columnInput');\n    const businessInput = document.getElementById('businessInput');\n    const synonymsInput = document.getElementById('synonymsInput');\n    const businessDescInput = document.getElementById('businessDescInput');\n    const commentInput = document.getElementById('commentInput');\n    const dataTypeInput = document.getElementById('dataTypeInput');\n\n    const importModalLayer = document.getElementById('importModalLayer');\n    const batchImportButton = document.getElementById('batchImportButton');\n    const addSemanticButton = document.getElementById('addSemanticButton');\n    const closeImportModal = document.getElementById('closeImportModal');\n    const cancelImportModal = document.getElementById('cancelImportModal');\n    const jsonTab = document.getElementById('jsonTab');\n    const excelTab = document.getElementById('excelTab');\n    const jsonPanel = document.getElementById('jsonPanel');\n    const excelPanel = document.getElementById('excelPanel');\n    const jsonInput = document.getElementById('jsonInput');\n    const validationLine = document.getElementById('validationLine');\n    const loadTemplateButton = document.getElementById('loadTemplateButton');\n    const validateJsonButton = document.getElementById('validateJsonButton');\n    const startImportButton = document.getElementById('startImportButton');\n    const excelUploadBox = document.getElementById('excelUploadBox');\n    const excelInput = document.getElementById('excelInput');\n\n    let editingCard = null;\n    let importMode = 'json';\n\n    const jsonTemplate = `[\n  {\n    \"tableName\": \"work_order\",\n    \"columnName\": \"order_type\",\n    \"businessName\": \"工单类型\",\n    \"synonyms\": \"类型,工单种类\",\n    \"businessDesc\": \"用于区分工单种类。枚举值：1=资产工单, 2=账号工单\",\n    \"dataType\": \"int\"\n  },\n  {\n    \"tableName\": \"work_order\",\n    \"columnName\": \"status\",\n    \"businessName\": \"工单状态\",\n    \"synonyms\": \"状态,处理状态\",\n    \"businessDesc\": \"工单当前处理状态。枚举值：0=待处理 1=处理中 2=已完成 3=已关闭\",\n    \"dataType\": \"int\"\n  }\n]`;\n\n    collapseButton.addEventListener('click', () => {\n      const collapsed = appShell.classList.toggle('is-collapsed');\n      collapseButton.setAttribute('aria-expanded', String(!collapsed));\n      collapseButton.setAttribute('aria-label', collapsed ? '展开侧边栏' : '收起侧边栏');\n      collapseButton.setAttribute('title', collapsed ? '展开侧边栏' : '收起侧边栏');\n    });\n\n    function selectedCards() {\n      return Array.from(document.querySelectorAll('.semantic-card.is-selected'));\n    }\n\n    function syncSelection() {\n      const count = selectedCards().length;\n      selectionText.textContent = `已选择 ${count} 条语义模型`;\n      deleteSelected.disabled = count === 0;\n    }\n\n    function applyFilters() {\n      const keyword = searchInput.value.trim().toLowerCase();\n      const type = typeFilter.value;\n\n      document.querySelectorAll('.semantic-card').forEach((card) => {\n        const haystack = `${card.dataset.table} ${card.dataset.column} ${card.dataset.business}`.toLowerCase();\n        const matchKeyword = !keyword || haystack.includes(keyword);\n        const matchType = type === 'all' || card.dataset.type === type;\n        card.classList.toggle('is-hidden', !(matchKeyword && matchType));\n      });\n    }\n\n    function openEditModal(card) {\n      editingCard = card;\n      const isNew = !card;\n      editModalTitle.textContent = isNew ? '添加语义模型' : '编辑语义模型';\n\n      tableInput.value = isNew ? '' : card.dataset.table;\n      columnInput.value = isNew ? '' : card.dataset.column;\n      businessInput.value = isNew ? '' : card.dataset.business;\n      synonymsInput.value = isNew ? '' : card.dataset.synonyms;\n      businessDescInput.value = isNew ? '' : card.dataset.desc;\n      commentInput.value = isNew ? '' : card.dataset.comment;\n      dataTypeInput.value = isNew ? '' : card.dataset.type;\n\n      editModalLayer.classList.add('is-open');\n      editModalLayer.setAttribute('aria-hidden', 'false');\n    }\n\n    function hideEditModal() {\n      editModalLayer.classList.remove('is-open');\n      editModalLayer.setAttribute('aria-hidden', 'true');\n    }\n\n    function openImportModal() {\n      importModalLayer.classList.add('is-open');\n      importModalLayer.setAttribute('aria-hidden', 'false');\n    }\n\n    function hideImportModal() {\n      importModalLayer.classList.remove('is-open');\n      importModalLayer.setAttribute('aria-hidden', 'true');\n    }\n\n    function setImportMode(mode) {\n      importMode = mode;\n      jsonTab.classList.toggle('is-active', mode === 'json');\n      excelTab.classList.toggle('is-active', mode === 'excel');\n      jsonPanel.classList.toggle('is-hidden', mode !== 'json');\n      excelPanel.classList.toggle('is-hidden', mode !== 'excel');\n      validateJsonButton.disabled = mode !== 'json';\n      loadTemplateButton.disabled = mode !== 'json';\n    }\n\n    document.querySelectorAll('.card-select').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        button.closest('.semantic-card').classList.toggle('is-selected');\n        syncSelection();\n      });\n    });\n\n    document.querySelectorAll('.semantic-card').forEach((card) => {\n      card.addEventListener('click', (event) => {\n        if (event.target.closest('button')) return;\n        card.classList.toggle('is-selected');\n        syncSelection();\n      });\n    });\n\n    document.querySelectorAll('.edit-button').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        openEditModal(button.closest('.semantic-card'));\n      });\n    });\n\n    document.querySelectorAll('.delete-button').forEach((button) => {\n      button.addEventListener('click', (event) => {\n        event.stopPropagation();\n        button.closest('.semantic-card').remove();\n        syncSelection();\n      });\n    });\n\n    deleteSelected.addEventListener('click', () => {\n      selectedCards().forEach((card) => card.remove());\n      syncSelection();\n    });\n\n    saveEditModal.addEventListener('click', () => {\n      if (editingCard) {\n        editingCard.dataset.table = tableInput.value;\n        editingCard.dataset.column = columnInput.value;\n        editingCard.dataset.business = businessInput.value;\n        editingCard.dataset.synonyms = synonymsInput.value;\n        editingCard.dataset.desc = businessDescInput.value;\n        editingCard.dataset.comment = commentInput.value;\n        editingCard.dataset.type = dataTypeInput.value;\n\n        editingCard.querySelector('.semantic-title').textContent = businessInput.value;\n        editingCard.querySelector('.semantic-status-line').innerHTML =\n          `<span class=\"tag tag-success\">${tableInput.value}.${columnInput.value}</span><span class=\"tag\">${dataTypeInput.value}</span>`;\n        editingCard.querySelector('.semantic-desc').textContent = businessDescInput.value || commentInput.value || '--';\n      }\n\n      hideEditModal();\n      applyFilters();\n    });\n\n    addSemanticButton.addEventListener('click', () => openEditModal(null));\n    batchImportButton.addEventListener('click', openImportModal);\n\n    closeEditModal.addEventListener('click', hideEditModal);\n    cancelEditModal.addEventListener('click', hideEditModal);\n    closeImportModal.addEventListener('click', hideImportModal);\n    cancelImportModal.addEventListener('click', hideImportModal);\n\n    searchInput.addEventListener('input', applyFilters);\n    typeFilter.addEventListener('change', applyFilters);\n\n    jsonTab.addEventListener('click', () => setImportMode('json'));\n    excelTab.addEventListener('click', () => setImportMode('excel'));\n\n    loadTemplateButton.addEventListener('click', () => {\n      jsonInput.value = jsonTemplate;\n      validationLine.textContent = '已加载 JSON 模板。';\n      validationLine.className = 'validation-line success';\n    });\n\n    validateJsonButton.addEventListener('click', () => {\n      try {\n        const parsed = JSON.parse(jsonInput.value);\n        if (!Array.isArray(parsed)) throw new Error('JSON 顶层必须是数组');\n        const missing = parsed.some((item) => !item.tableName || !item.columnName || !item.businessName || !item.dataType);\n        if (missing) throw new Error('存在缺少必填字段的记录');\n        validationLine.textContent = `验证通过，共 ${parsed.length} 条记录。`;\n        validationLine.className = 'validation-line success';\n      } catch (error) {\n        validationLine.textContent = `验证失败：${error.message}`;\n        validationLine.className = 'validation-line error';\n      }\n    });\n\n    excelUploadBox.addEventListener('click', () => excelInput.click());\n\n    excelInput.addEventListener('change', () => {\n      if (excelInput.files.length) {\n        excelUploadBox.innerHTML = `<span><strong>${excelInput.files[0].name}</strong>文件已选择，可点击开始导入</span>`;\n      }\n    });\n\n    startImportButton.addEventListener('click', () => {\n      startImportButton.textContent = '导入中...';\n      startImportButton.disabled = true;\n      setTimeout(() => {\n        startImportButton.textContent = '开始导入';\n        startImportButton.disabled = false;\n        hideImportModal();\n      }, 900);\n    });\n\n    editModalLayer.addEventListener('click', (event) => {\n      if (event.target === editModalLayer) hideEditModal();\n    });\n\n    importModalLayer.addEventListener('click', (event) => {\n      if (event.target === importModalLayer) hideImportModal();\n    });\n\n    document.addEventListener('keydown', (event) => {\n      if (event.key === 'Escape') {\n        hideEditModal();\n        hideImportModal();\n      }\n    });\n\n    syncSelection();\n    applyFilters();\n    setImportMode('json');\n  <\/script>\n</body>\n</html>\n","presetQuestion":"\n<!doctype html>\n<html lang=\"zh-CN\">\n<head>\n  <meta charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n  <title>KM-MOM DataAgent - 预设问题管理</title>\n  <style>\n    :root {\n      --bg: #FAFAFA;\n      --fg: #111111;\n      --surface: #FFFFFF;\n      --muted: #6B6B6B;\n      --border: #E5E5E5;\n      --accent: #2F6FEB;\n      --success: #17A34A;\n      --warn: #EAB308;\n      --danger: #DC2626;\n      --sidebar: #F4F7FC;\n      --sidebar-strong: #EAF1FF;\n      --modal-shadow: 0 16px 48px rgba(17, 17, 17, 0.18);\n      --font: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;\n      --sidebar-width: 288px;\n    }\n\n    * { box-sizing: border-box; }\n\n    html,\n    body {\n      min-height: 100%;\n      margin: 0;\n      background: var(--bg);\n      color: var(--fg);\n      font-family: var(--font);\n      font-size: 14px;\n      line-height: 1.5;\n    }\n\n    body { overflow: hidden; }\n\n    button,\n    input,\n    select,\n    textarea {\n      font: inherit;\n    }\n\n    button { cursor: pointer; }\n\n    button:disabled {\n      cursor: not-allowed;\n      opacity: 0.58;\n    }\n\n    svg {\n      width: 18px;\n      height: 18px;\n      display: block;\n      flex: 0 0 auto;\n    }\n\n    .app-shell {\n      width: 100vw;\n      height: 100dvh;\n      min-height: 720px;\n      display: grid;\n      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);\n      background: var(--bg);\n      transition: grid-template-columns 180ms ease;\n    }\n\n    .app-shell.is-collapsed { --sidebar-width: 76px; }\n\n    .sidebar {\n      height: 100dvh;\n      min-height: 720px;\n      background: var(--sidebar);\n      border-right: 1px solid var(--border);\n      display: flex;\n      flex-direction: column;\n      padding: 18px 14px;\n      gap: 16px;\n      min-width: 0;\n    }\n\n    .brand-row {\n      display: grid;\n      grid-template-columns: minmax(0, 1fr) 34px;\n      align-items: center;\n      gap: 10px;\n      min-height: 48px;\n    }\n\n    .brand-name {\n      min-width: 0;\n      font-weight: 600;\n      line-height: 1.15;\n      letter-spacing: -0.01em;\n      color: var(--fg);\n    }\n\n    .brand-name span {\n      display: block;\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n\n    .brand-name span:first-child { font-size: 19px; }\n\n    .brand-name span:last-child {\n      margin-top: 2px;\n      font-size: 17px;\n      color: color-mix(in srgb, var(--fg) 82%, var(--muted));\n    }\n\n    .collapse-button {\n      width: 34px;\n      height: 34px;\n      border: 1px solid var(--border);\n      border-radius: 8px;\n      display: grid;\n      place-items: center;\n      background: var(--surface);\n      color: var(--muted);\n      padding: 0;\n    }\n\n    .collapse-button:hover {\n      color: var(--accent);\n      border-color: color-mix(in srgb, var(--accent) 36%, var(--border));\n    }\n\n    .primary-actions,\n    .nav-list {\n      display: grid;\n      gap: 10px;\n    }\n\n    .btn {\n      min-height: 38px;\n      border-radius: 8px;\n      border: 1px solid transparent;\n      padding: 9px 14px;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      gap: 8px;\n      font-weight: 600;\n      white-space: nowrap;\n      background: var(--surface);\n      color: var(--fg);\n      line-height: 1.2;\n    }\n\n    .btn-primary {\n      background: var(--accent);\n      color: #FFFFFF;\n    }\n\n    .btn-secondary { border-color: var(--border); }\n\n    .btn-secondary:hover {\n      color: var(--accent);\n      border-color: color-mix(in srgb, var(--accent) 34%, var(--border));\n    }\n\n    .btn-soft {\n      background: color-mix(in srgb, var(--accent) 8%, white);\n      color: var(--accent);\n      border-color: color-mix(in srgb, var(--accent) 24%, var(--border));\n    }\n\n    .btn-danger {\n      color: var(--danger);\n      border-color: color-mix(in srgb, var(--danger) 28%, var(--border));\n      background: color-mix(in srgb, var(--danger) 6%, white);\n    }\n\n    .nav-block {\n      min-height: 0;\n      display: flex;\n      flex-direction: column;\n      gap: 10px;\n      flex: 1;\n      padding-top: 2px;\n    }\n\n    .nav-title {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      color: var(--muted);\n      font-size: 12px;\n      font-weight: 600;\n    }\n\n    .nav-list {\n      min-height: 0;\n       align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--surface);
    }

    .model-group-title {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
    }

    .model-group-summary {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      min-width: 0;
    }

    .table-scroll {
      width: 100%;
      min-height: 0;
      max-height: 260px;
      overflow: auto;
    }

    .model-table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
      --model-actions-width: 248px;
    }

    .model-table th,
    .model-table td {
      border-bottom: 1px solid var(--border);
      padding: 10px;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .model-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      color: var(--muted);
      background: #F7F8FA;
      font-size: 12px;
      font-weight: 600;
    }

    .model-table tbody tr:hover { background: #FAFBFD; }
    .model-table tbody tr:last-child td { border-bottom: 0; }

    .model-table th:nth-child(1),
    .model-table td:nth-child(1) { width: 20%; }
    .model-table th:nth-child(2),
    .model-table td:nth-child(2) { width: 36%; }
    .model-table th:nth-child(3),
    .model-table td:nth-child(3) { width: 12%; }
    .model-table th:nth-child(4),
    .model-table td:nth-child(4) { width: 32%; }

    .model-name {
      color: var(--fg);
      font-weight: 600;
    }

    .model-table .api-cell {
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      overflow-wrap: anywhere;
      word-break: break-all;
      line-height: 1.4;
    }

    .api-text {
      display: block;
      max-width: 100%;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-all;
      line-height: 1.4;
    }

    .empty-cell {
      color: var(--muted);
      text-align: center !important;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      height: 24px;
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 0 8px;
      background: #FFFFFF;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .tag-success {
      color: var(--success);
      border-color: color-mix(in srgb, var(--success) 30%, var(--border));
      background: color-mix(in srgb, var(--success) 7%, white);
    }

    .model-type-tag,
    .status-tag {
      justify-content: center;
    }

    .model-type-tag { width: 70px; }
    .status-tag { width: 66px; }

    .type-chat {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 30%, var(--border));
      background: color-mix(in srgb, var(--accent) 7%, white);
    }

    .type-embedding {
      color: var(--success);
      border-color: color-mix(in srgb, var(--success) 30%, var(--border));
      background: color-mix(in srgb, var(--success) 7%, white);
    }

    .type-asr {
      color: var(--warn);
      border-color: color-mix(in srgb, var(--warn) 34%, var(--border));
      background: color-mix(in srgb, var(--warn) 9%, white);
    }

    .action-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: nowrap;
      gap: 6px;
      width: var(--model-actions-width);
      margin-left: auto;
    }

    .action-row .btn {
      width: auto;
      min-width: 54px;
    }

    .model-table th:last-child {
      text-align: right;
    }

    .model-table td:last-child {
      text-align: right;
      overflow: visible;
    }

    .action-head {
      display: inline-block;
      width: var(--model-actions-width);
      text-align: left;
    }

    .btn {
      min-height: 42px;
      border-radius: 8px;
      border: 1px solid transparent;
      padding: 10px 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 600;
      white-space: nowrap;
      background: var(--surface);
      color: var(--fg);
      line-height: 1.2;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #FFFFFF;
    }

    .btn-secondary {
      border-color: var(--border);
      background: var(--surface);
    }

    .btn-secondary:hover {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 36%, var(--border));
    }

    .btn-soft {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 24%, var(--border));
      background: color-mix(in srgb, var(--accent) 7%, white);
    }

    .btn-danger {
      color: var(--danger);
      border-color: color-mix(in srgb, var(--danger) 28%, var(--border));
      background: var(--surface);
    }

    .btn-test {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 28%, var(--border));
      background: color-mix(in srgb, var(--accent) 6%, white);
    }

    .btn-enable {
      color: var(--success);
      border-color: color-mix(in srgb, var(--success) 30%, var(--border));
      background: color-mix(in srgb, var(--success) 7%, white);
    }

    .btn-stop {
      color: var(--danger);
      border-color: color-mix(in srgb, var(--danger) 34%, var(--border));
      background: color-mix(in srgb, var(--danger) 7%, white);
    }

    .btn-edit {
      color: var(--edit);
      border-color: color-mix(in srgb, var(--edit) 28%, var(--border));
      background: color-mix(in srgb, var(--edit) 6%, white);
    }

    .btn:disabled {
      opacity: 0.52;
      cursor: not-allowed;
    }

    .btn-small {
      min-height: 32px;
      padding: 7px 10px;
      font-size: 12px;
    }

    .footer-actions {
      border-top: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 94%, var(--bg));
      padding: 18px 32px 24px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      min-width: 0;
      overflow-x: auto;
    }

    .modal-layer {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 32px;
      background: rgba(17, 17, 17, 0.28);
      z-index: 30;
    }

    .modal-layer.is-open { display: grid; }

    .modal {
      width: min(760px, 100%);
      max-height: min(760px, calc(100vh - 64px));
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--modal-shadow);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .confirm-modal {
      width: min(480px, 100%);
    }

    .modal-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .modal-title {
      display: grid;
      gap: 4px;
    }

    .modal-title h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 600;
    }

    .modal-title p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .close-button {
      width: 34px;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      display: grid;
      place-items: center;
      padding: 0;
    }

    .modal-body {
      overflow: auto;
      padding: 18px 20px;
    }

    .confirm-copy {
      margin: 0;
      color: var(--fg);
      line-height: 1.6;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-content: start;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.full { grid-column: 1 / -1; }

    .field label {
      color: var(--fg);
      font-size: 12px;
      font-weight: 600;
    }

    .required {
      color: var(--danger);
      margin-left: 2px;
    }

    .input.is-invalid {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--danger) 12%, transparent);
    }

    .secret-field {
      position: relative;
    }

    .secret-field .input {
      padding-right: 58px;
    }

    .secret-toggle {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: #FFFFFF;
      color: var(--muted);
      padding: 0 9px;
      font-size: 12px;
      font-weight: 600;
    }

    .secret-toggle:hover {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 32%, var(--border));
    }

    .input,
    .select {
      width: 100%;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--fg);
      padding: 0 10px;
      outline: 0;
    }

    .input:focus,
    .select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 14%, transparent);
    }

    .input:disabled {
      background: #F4F4F5;
      color: var(--muted);
      cursor: not-allowed;
    }

    .modal-actions {
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      background: #FFFFFF;
    }

    @media (max-width: 900px) {
      .content { padding: 20px 16px 18px; }
      .page-head { display: grid; }
      .active-summary { grid-template-columns: 1fr; }
      .footer-actions { padding: 14px 16px 18px; }
      .form-grid { grid-template-columns: 1fr; }
      .modal-layer { padding: 18px; }
    }
  </style>
</head>
<body>
  <main class="app-shell" aria-label="KM-MOM DataAgent 模型配置页面">
    <section class="main" aria-label="模型配置内容区域">
      <section class="content model-content">
        <div class="content-inner model-content-inner">
          <header class="page-head">
            <div class="page-title">
              <h1>模型配置</h1>
              <p>按模型对象维护对话模型、嵌入模型、语音模型；对话模型和嵌入模型为必配类型，语音模型按客户需求配置。</p>
            </div>
          </header>

          <section class="toolbar" aria-label="模型类型筛选">
            <select id="modelTypeFilter" class="select type-filter" aria-label="模型类型筛选">
              <option value="all">全部模型类型</option>
              <option value="对话模型">对话模型</option>
              <option value="嵌入模型">嵌入模型</option>
              <option value="语音模型">语音模型</option>
            </select>
          </section>

          <section id="activeModelSummary" class="active-summary" aria-label="当前启用模型"></section>

          <section id="modelGroups" class="model-groups" aria-label="模型配置列表"></section>
        </div>
      </section>

      <footer class="footer-actions" aria-label="底部操作区">
        <button id="addModelButton" class="btn btn-primary" type="button">增加模型</button>
      </footer>
    </section>
  </main>

  <div id="modalLayer" class="modal-layer" aria-hidden="true">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <header class="modal-head">
        <div class="modal-title">
          <h2 id="modalTitle">编辑模型</h2>
          <p>维护模型对象的连接与启用状态。</p>
        </div>
        <button id="closeModal" class="close-button" type="button" aria-label="关闭弹窗">×</button>
      </header>
      <div class="modal-body">
        <div class="form-grid">
          <div class="field">
            <label for="modelTypeInput">模型类型</label>
            <select id="modelTypeInput" class="select">
              <option value="对话模型">对话模型</option>
              <option value="嵌入模型">嵌入模型</option>
              <option value="语音模型">语音模型</option>
            </select>
          </div>
          <div class="field">
            <label for="statusInput">状态</label>
            <select id="statusInput" class="select">
              <option value="enabled">已启用</option>
              <option value="disabled">未启用</option>
            </select>
          </div>
          <div class="field full">
            <label for="modelNameInput">模型名称</label>
            <input id="modelNameInput" class="input" type="text">
          </div>
          <div class="field full">
            <label for="apiUrlInput">API地址<span class="required">*</span></label>
            <input id="apiUrlInput" class="input" type="text" required>
          </div>
          <div class="field full">
            <label for="apiKeyInput">API Key<span class="required">*</span></label>
            <div class="secret-field">
              <input id="apiKeyInput" class="input" type="password" required>
              <button id="apiKeyToggle" class="secret-toggle" type="button">显示</button>
            </div>
          </div>
          <div class="field">
            <label for="temperatureInput">温度</label>
            <input id="temperatureInput" class="input" type="number" min="0" max="100" step="0.1">
          </div>
          <div class="field">
            <label for="maxTokenInput">最大Token</label>
            <input id="maxTokenInput" class="input" type="text">
          </div>
        </div>
      </div>
      <footer class="modal-actions">
        <button id="cancelModal" class="btn btn-secondary" type="button">取消</button>
        <button id="saveModal" class="btn btn-primary" type="button">保存</button>
      </footer>
    </section>
  </div>

  <div id="confirmLayer" class="modal-layer" aria-hidden="true">
    <section class="modal confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <header class="modal-head">
        <div class="modal-title">
          <h2 id="confirmTitle">启用模型</h2>
          <p>确认默认模型切换。</p>
        </div>
        <button id="closeConfirm" class="close-button" type="button" aria-label="关闭确认弹窗">×</button>
      </header>
      <div class="modal-body">
        <p id="confirmText" class="confirm-copy"></p>
      </div>
      <footer class="modal-actions">
        <button id="cancelConfirm" class="btn btn-secondary" type="button">取消</button>
        <button id="confirmEnableModel" class="btn btn-secondary" type="button">确认启用</button>
      </footer>
    </section>
  </div>

  <script>
    const modelTypes = [
      { type: '对话模型', note: '必配', className: 'type-chat' },
      { type: '嵌入模型', note: '必配', className: 'type-embedding' },
      { type: '语音模型', note: '选配', className: 'type-asr' }
    ];

    const models = [
      { id: '1', name: '通义千问-Max', type: '对话模型', apiUrl: 'https://dashscope.aliyuncs.com/compatible-mode/v1', apiKey: 'sk-dashscope-001', temperature: '0.7', maxToken: '4096', enabled: true },
      { id: '2', name: 'DeepSeek-V3', type: '对话模型', apiUrl: 'https://api.deepseek.com/v1', apiKey: 'sk-deepseek-002', temperature: '0.6', maxToken: '8192', enabled: false },
      { id: '3', name: 'text-embedding-v3', type: '嵌入模型', apiUrl: 'https://dashscope.aliyuncs.com/compatible-mode/v1', apiKey: 'sk-embedding-003', temperature: '-', maxToken: '-', enabled: true },
      { id: '4', name: 'bge-large-zh', type: '嵌入模型', apiUrl: 'https://embedding.example.com/v1', apiKey: 'sk-embedding-004', temperature: '-', maxToken: '-', enabled: false },
      { id: '5', name: 'Paraformer-zh', type: '语音模型', apiUrl: 'https://dashscope.aliyuncs.com/api/v1/services/audio/asr', apiKey: 'sk-asr-005', temperature: '-', maxToken: '-', enabled: false }
    ];

    const modelTypeFilter = document.getElementById('modelTypeFilter');
    const modelGroups = document.getElementById('modelGroups');
    const activeModelSummary = document.getElementById('activeModelSummary');
    const modalLayer = document.getElementById('modalLayer');
    const modalTitle = document.getElementById('modalTitle');
    const modelNameInput = document.getElementById('modelNameInput');
    const modelTypeInput = document.getElementById('modelTypeInput');
    const apiUrlInput = document.getElementById('apiUrlInput');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const apiKeyToggle = document.getElementById('apiKeyToggle');
    const temperatureInput = document.getElementById('temperatureInput');
    const maxTokenInput = document.getElementById('maxTokenInput');
    const statusInput = document.getElementById('statusInput');
    const addModelButton = document.getElementById('addModelButton');
    const closeModal = document.getElementById('closeModal');
    const cancelModal = document.getElementById('cancelModal');
    const saveModal = document.getElementById('saveModal');
    const confirmLayer = document.getElementById('confirmLayer');
    const confirmText = document.getElementById('confirmText');
    const closeConfirm = document.getElementById('closeConfirm');
    const cancelConfirm = document.getElementById('cancelConfirm');
    const confirmEnableModel = document.getElementById('confirmEnableModel');

    let editingId = null;
    let pendingEnableId = null;
    let pendingAction = null;

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function typeClassFor(type) {
      const config = modelTypes.find((item) => item.type === type);
      return config ? config.className : '';
    }

    function renderActiveModelSummary() {
      activeModelSummary.innerHTML = modelTypes.map((config) => {
        const activeModel = models.find((model) => model.type === config.type && model.enabled);
        return '<article class="summary-item">' +
          '<span class="summary-label">当前' + escapeHtml(config.type) + '</span>' +
          '<div class="summary-value" title="' + escapeHtml(activeModel ? activeModel.name : '未启用') + '">' +
            escapeHtml(activeModel ? activeModel.name : '未启用') +
          '</div>' +
        '</article>';
      }).join('');
    }

    function renderModels() {
      renderActiveModelSummary();
      const selectedType = modelTypeFilter.value;
      modelGroups.innerHTML = modelTypes.map((config) => {
        const groupModels = models.filter((model) => model.type === config.type);
        const isHidden = selectedType !== 'all' && selectedType !== config.type;
        const activeModel = groupModels.find((model) => model.enabled);
        const bodyHtml = groupModels.length
          ? groupModels.map((model) => {
              const statusText = model.enabled ? '已启用' : '未启用';
              const toggleText = model.enabled ? '停用' : '启用';
              const toggleClass = model.enabled ? 'btn-danger' : 'btn-soft';
              return '<tr data-id="' + escapeHtml(model.id) + '">' +
                '<td class="model-name">' + escapeHtml(model.name) + '</td>' +
                '<td class="api-cell" title="' + escapeHtml(model.apiUrl) + '"><span class="api-text">' + escapeHtml(model.apiUrl) + '</span></td>' +
                '<td><span class="tag status-tag ' + (model.enabled ? 'tag-success' : '') + '">' + statusText + '</span></td>' +
                '<td><div class="action-row">' +
                  '<button class="btn btn-secondary btn-small" type="button" data-action="test">测试连接</button>' +
                  '<button class="btn ' + toggleClass + ' btn-small" type="button" data-action="toggle">' + toggleText + '</button>' +
                  '<button class="btn btn-secondary btn-small" type="button" data-action="edit">编辑</button>' +
                  '<button class="btn btn-danger btn-small" type="button" data-action="delete">删除</button>' +
                '</div></td>' +
              '</tr>';
            }).join('')
          : '<tr><td class="empty-cell" colspan="4">暂无' + escapeHtml(config.type) + '</td></tr>';

        return '<article class="model-group' + (isHidden ? ' is-hidden' : '') + '" data-model-group="' + escapeHtml(config.type) + '">' +
          '<div class="model-group-head">' +
            '<h2 class="model-group-title">' + escapeHtml(config.type) + '</h2>' +
            '<div class="model-group-summary">' +
              '<span>' + (activeModel ? '已启用：' + escapeHtml(activeModel.name) : (config.note === '选配' ? '按客户需求配置' : '未启用')) + '</span>' +
              '<span class="tag ' + config.className + '">' + groupModels.length + ' 个</span>' +
            '</div>' +
          '</div>' +
          '<div class="table-scroll">' +
            '<table class="model-table">' +
              '<thead><tr>' +
                '<th>模型名称</th>' +
                '<th>API 地址</th>' +
                '<th>状态</th>' +
                '<th><span class="action-head">操作</span></th>' +
              '</tr></thead>' +
              '<tbody>' + bodyHtml + '</tbody>' +
            '</table>' +
          '</div>' +
        '</article>';
      }).join('');
    }

    function modelById(id) {
      return models.find((model) => model.id === id);
    }

    function enableModel(id) {
      const model = modelById(id);
      if (!model) return;
      models.filter((item) => item.type === model.type).forEach((item) => {
        item.enabled = false;
      });
      model.enabled = true;
      renderModels();
    }

    function disableModel(id) {
      const model = modelById(id);
      if (!model) return;
      model.enabled = false;
      renderModels();
    }

    function openConfirmModal(id) {
      const model = modelById(id);
      if (!model) return;
      pendingEnableId = id;
      pendingAction = model.enabled ? 'disable' : 'enable';
      const actionText = pendingAction === 'enable' ? '启用' : '停用';
      confirmTitle.textContent = actionText + '模型';
      confirmText.textContent = pendingAction === 'enable'
        ? '确认是否启用该' + model.type + '“' + model.name + '”作为默认的' + model.type + '？'
        : '确认是否停用该' + model.type + '“' + model.name + '”？';
      confirmEnableModel.textContent = pendingAction === 'enable' ? '确认启用' : '确认停用';
      confirmLayer.classList.add('is-open');
      confirmLayer.setAttribute('aria-hidden', 'false');
    }

    function closeConfirmModal() {
      pendingEnableId = null;
      pendingAction = null;
      confirmLayer.classList.remove('is-open');
      confirmLayer.setAttribute('aria-hidden', 'true');
    }

    function syncModelFieldState() {
      const isChatModel = modelTypeInput.value === '对话模型';
      temperatureInput.disabled = !isChatModel;
      maxTokenInput.disabled = !isChatModel;
      if (!isChatModel) {
        temperatureInput.value = '-';
        maxTokenInput.value = '-';
      }
    }

    function normalizeTemperature(value) {

        .reduce((max, number) => Math.max(max, number), 0);
      return String(maxNumber + 1);

      apiUrlInput.classList.remove('is-invalid');
      apiKeyInput.classList.remove('is-invalid');

      clearFieldErrors();
      if (!apiUrlInput.value.trim()) {
        apiUrlInput.classList.add('is-invalid');
        apiUrlInput.focus();

      if (!apiKeyInput.value.trim()) {

        apiKeyInput.focus();
        return false;
      }

      modalTitle.textContent = model ? '编辑模型' : '增加模型';
      modelTypeInput.value = model ? model.type : '对话模型';

      apiUrlInput.value = model ? model.apiUrl : '';
      apiKeyInput.value = model ? model.apiKey : '';
      temperatureInput.value = model ? model.temperature : '';
      maxTokenInput.value = model ? model.maxToken : '';
      statusInput.value = model && model.enabled ? 'enabled' : 'disabled';

      clearFieldErrors();
      syncModelFieldState();

      modalLayer.setAttribute('aria-hidden', 'false');

    }

        name: modelNameInput.value.trim() || '未命名模型',

  <script>
    const appShell = document.getElementById('appShell');
    const collapseButton = document.getElementById('collapseButton');
    const searchInput = document.getElementById('searchInput');
    const statusFilter = document.getElementById('statusFilter');
    const sourceTableBody = document.getElementById('sourceTableBody');
    const modalLayer = document.getElementById('modalLayer');
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');
    const modalName = document.getElementById('modalName');
    const modalType = document.getElementById('modalType');
    const modalHost = document.getElementById('modalHost');
    const modalPort = document.getElementById('modalPort');
    const modalDb = document.getElementById('modalDb');
    const modalUser = document.getElementById('modalUser');
    const modalPassword = document.getElementById('modalPassword');
    const modalEnabled = document.getElementById('modalEnabled');
    const addSourceButton = document.getElementById('addSourceButton');
    const initSourceButton = document.getElementById('initSourceButton');
    const closeModal = document.getElementById('closeModal');
    const cancelModal = document.getElementById('cancelModal');
    const saveModal = document.getElementById('saveModal');

    let editingRow = null;

    collapseButton.addEventListener('click', () => {
      const collapsed = appShell.classList.toggle('is-collapsed');
      collapseButton.setAttribute('aria-expanded', String(!collapsed));
      collapseButton.setAttribute('aria-label', collapsed ? '展开侧边栏' : '收起侧边栏');
      collapseButton.setAttribute('title', collapsed ? '展开侧边栏' : '收起侧边栏');
    });

    function rows() {
      return Array.from(sourceTableBody.querySelectorAll('tr'));
    }

    function applyFilters() {
      const keyword = searchInput.value.trim().toLowerCase();
      const status = statusFilter.value;

      rows().forEach((row) => {
        const matchKeyword = !keyword || row.dataset.name.toLowerCase().includes(keyword);
        const matchStatus =
          status === 'all' ||
          (status === 'enabled' && row.dataset.enabled === 'true') ||
          (status === 'disabled' && row.dataset.enabled !== 'true');
        row.hidden = !(matchKeyword && matchStatus);
      });
    }

    function setRowEnabled(row, enabled) {
      const label = row.querySelector('.enable-label');
      const button = row.querySelector('.toggle-enable');

      row.dataset.enabled = String(enabled);
      label.textContent = enabled ? '已启用' : '未启用';
      label.classList.toggle('tag-success', enabled);
      button.textContent = enabled ? '禁用' : '启用';
      button.classList.toggle('btn-danger', enabled);
      button.classList.toggle('btn-soft', !enabled);
      applyFilters();
    }

    function setRowInitialized(row) {
      row.dataset.init = 'true';
    }

    function splitAddress(address) {
      const index = address.lastIndexOf(':');
      if (index < 0) return { host: address, port: '' };
      return {
        host: address.slice(0, index),
        port: address.slice(index + 1)
      };
    }

    function openModal(row) {
      editingRow = row;
      const isNew = !row;
      const address = isNew ? { host: '10.24.18.36', port: '3306' } : splitAddress(row.dataset.address);

      modalTitle.textContent = isNew ? '添加数据源' : '编辑数据源';
      modalDesc.textContent = isNew ? '新增一个 Agent 可访问的数据源。' : '编辑数据源连接信息与启用状态。';
      modalName.value = isNew ? '新数据源' : row.dataset.name;
      modalType.value = isNew ? 'MySQL' : row.dataset.type;
      modalHost.value = address.host;
      modalPort.value = address.port;
      modalDb.value = isNew ? 'database_name' : row.dataset.db;
      modalUser.value = 'mom_reader';
      modalPassword.value = '123456';
      modalEnabled.value = isNew ? 'true' : row.dataset.enabled;

      modalLayer.classList.add('is-open');
      modalLayer.setAttribute('aria-hidden', 'false');
    }

    function hideModal() {
      modalLayer.classList.remove('is-open');
      modalLayer.setAttribute('aria-hidden', 'true');
    }

    function createRow() {
      const row = document.createElement('tr');
      row.dataset.connection = 'success';
      row.dataset.init = 'false';
      row.innerHTML =
        '<td class="name-cell"></td>' +
        '<td></td>' +
        '<td class="wrap-cell"></td>' +
        '<td class="wrap-cell"></td>' +
        '<td><span class="tag enable-label"></span></td>' +
        '<td><div class="action-cell"><button class="btn btn-secondary test-button" type="button">测试连接</button><button class="btn toggle-enable" type="button"></button><button class="btn btn-secondary config-button" type="button">编辑</button><button class="btn btn-danger delete-button" type="button">删除</button></div></td>';
      return row;
    }

    function saveModalData() {
      if (!modalName.value.trim() || !modalHost.value.trim() || !modalPort.value.trim() || !modalDb.value.trim()) return;

      const row = editingRow || createRow();
      const address = modalHost.value.trim() + ':' + modalPort.value.trim();
      const enabled = modalEnabled.value === 'true';

      row.dataset.name = modalName.value.trim();
      row.dataset.type = modalType.value;
      row.dataset.address = address;
      row.dataset.db = modalDb.value.trim();

      row.children[0].textContent = row.dataset.name;
      row.children[1].textContent = row.dataset.type;
      row.children[2].textContent = row.dataset.address;
      row.children[3].textContent = row.dataset.db;
      setRowEnabled(row, enabled);

      if (!editingRow) sourceTableBody.appendChild(row);
      hideModal();
      applyFilters();
    }

    sourceTableBody.addEventListener('click', (event) => {
      const row = event.target.closest('tr');
      if (!row) return;

      if (event.target.closest('.toggle-enable')) {
        setRowEnabled(row, row.dataset.enabled !== 'true');
        return;
      }

      if (event.target.closest('.test-button')) {
        const button = event.target.closest('.test-button');
        button.textContent = '测试中';
        button.disabled = true;
        setTimeout(() => {
          button.textContent = '测试连接';
          button.disabled = false;
        }, 800);
        return;
      }

      if (event.target.closest('.config-button')) {
        openModal(row);
        return;
      }

      if (event.target.closest('.delete-button')) {
        row.remove();
        applyFilters();
      }
    });

    searchInput.addEventListener('input', applyFilters);
    statusFilter.addEventListener('change', applyFilters);

    addSourceButton.addEventListener('click', () => openModal(null));

    initSourceButton.addEventListener('click', () => {
      rows().forEach(setRowInitialized);
    });

    closeModal.addEventListener('click', hideModal);
    cancelModal.addEventListener('click', hideModal);
    saveModal.addEventListener('click', saveModalData);

    modalLayer.addEventListener('click', (event) => {
      if (event.target === modalLayer) hideModal();
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') hideModal();
    });

    applyFilters();
  <\/script>
